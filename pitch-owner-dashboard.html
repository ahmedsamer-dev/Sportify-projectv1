<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Manage your pitches, control availability, and handle booking requests on SPORTIFY.">
    <title>Pitch Owner Dashboard — SPORTIFY</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: var(--s-4);
            margin-bottom: var(--s-6);
        }

        .dash-header h1 {
            font-size: 1.5rem;
        }

        .dash-tabs {
            display: flex;
            gap: var(--s-1);
            border-bottom: 1px solid var(--border);
            margin-bottom: var(--s-6);
        }

        .dash-tab {
            padding: var(--s-3) var(--s-5);
            border: none;
            background: none;
            color: var(--text-faint);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all var(--t-fast);
            font-family: inherit;
        }

        .dash-tab:hover {
            color: var(--text-p);
        }

        .dash-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Pitch management card */
        .pitch-manage-card {
            display: flex;
            gap: var(--s-5);
            padding: var(--s-5);
            border-bottom: 1px solid var(--border);
            transition: background var(--t-fast);
        }

        .pitch-manage-card:hover {
            background: var(--bg-elevated);
        }

        .pitch-manage-card:last-child {
            border-bottom: none;
        }

        .pitch-manage-icon {
            width: 64px;
            height: 64px;
            border-radius: var(--r-md);
            background: linear-gradient(135deg, var(--primary-subtle), var(--accent-subtle));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .pitch-manage-info {
            flex: 1;
            min-width: 0;
        }

        .pitch-manage-info h4 {
            margin-bottom: 2px;
        }

        .pitch-manage-actions {
            display: flex;
            gap: var(--s-2);
            flex-shrink: 0;
            align-items: flex-start;
        }

        /* Availability toggle */
        .avail-toggle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: var(--r-full);
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid;
            transition: all var(--t-fast);
        }

        .avail-toggle.available {
            background: var(--accent-subtle);
            border-color: var(--accent);
            color: var(--accent);
        }

        .avail-toggle.unavailable {
            background: var(--danger-subtle);
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Booking request card */
        .booking-req {
            display: flex;
            gap: var(--s-4);
            align-items: center;
            padding: var(--s-4);
            border-bottom: 1px solid var(--border);
        }

        .booking-req:last-child {
            border-bottom: none;
        }

        .booking-req-info {
            flex: 1;
        }

        .booking-req-actions {
            display: flex;
            gap: var(--s-2);
        }

        /* Stats mini */
        .stat-mini {
            display: flex;
            align-items: center;
            gap: var(--s-2);
            font-size: 0.82rem;
            color: var(--text-faint);
        }

        .stat-mini .stat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* Quick action bar */
        .quick-action-bar {
            display: flex;
            gap: var(--s-3);
            padding: var(--s-4);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            margin-bottom: var(--s-6);
            flex-wrap: wrap;
        }

        /* Add pitch modal form */
        .form-section {
            margin-bottom: var(--s-5);
        }

        .form-section h4 {
            margin-bottom: var(--s-3);
            color: var(--text-h);
        }

        .amenity-grid {
            display: flex;
            flex-wrap: wrap;
            gap: var(--s-2);
        }

        .amenity-chip {
            padding: 6px 14px;
            border-radius: var(--r-full);
            border: 1px solid var(--border-strong);
            background: var(--bg-surface);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--t-fast);
        }

        .amenity-chip:hover {
            border-color: var(--primary-border);
        }

        .amenity-chip.selected {
            border-color: var(--primary);
            background: var(--primary-subtle);
            color: var(--primary);
        }

        /* ============================================
           AVAILABILITY GRID — Visual Time Slot Selector
           ============================================ */
        .avail-pitch-selector {
            display: flex;
            gap: var(--s-3);
            margin-bottom: var(--s-5);
            flex-wrap: wrap;
        }

        .avail-pitch-btn {
            padding: 8px 18px;
            border-radius: var(--r-full);
            border: 1px solid var(--border-strong);
            background: var(--bg-surface);
            color: var(--text-faint);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: var(--font-display);
        }

        .avail-pitch-btn:hover {
            border-color: var(--primary-border);
            color: var(--text-p);
        }

        .avail-pitch-btn.active {
            background: var(--primary-subtle-strong);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 12px rgba(0, 230, 118, 0.15);
        }

        .avail-grid-wrapper {
            overflow-x: auto;
            border-radius: var(--r-lg);
            border: 1px solid var(--border);
        }

        .avail-grid {
            display: grid;
            grid-template-columns: 100px repeat(7, 1fr);
            min-width: 640px;
        }

        .avail-grid-header {
            background: var(--bg-elevated);
            padding: 10px 6px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-h);
            letter-spacing: 0.03em;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            font-family: var(--font-display);
        }

        .avail-grid-time {
            padding: 0 10px;
            display: flex;
            align-items: center;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-faint);
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            min-height: 40px;
            font-family: var(--font-display);
        }

        .avail-slot {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            cursor: pointer;
            border-right: 1px solid rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.15s ease;
            -webkit-user-select: none;
            user-select: none;
            position: relative;
        }

        .avail-slot::after {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border-strong);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .avail-slot:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .avail-slot:hover::after {
            transform: scale(1.3);
        }

        .avail-slot.active {
            background: rgba(0, 230, 118, 0.08);
        }

        .avail-slot.active::after {
            width: 14px;
            height: 14px;
            background: var(--primary);
            box-shadow: 0 0 8px rgba(0, 230, 118, 0.4);
        }

        .avail-slot.active:hover {
            background: rgba(0, 230, 118, 0.12);
        }

        /* Day quick-select row */
        .avail-day-actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 6px 4px;
            border-right: 1px solid rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--border);
            background: var(--bg-elevated);
        }

        .avail-day-btn {
            padding: 3px 8px;
            border: none;
            background: none;
            color: var(--text-faint);
            font-size: 0.65rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: var(--r-sm);
            transition: all var(--t-fast);
            text-transform: uppercase;
            letter-spacing: 0.02em;
            font-family: inherit;
        }

        .avail-day-btn:hover {
            color: var(--text-h);
            background: rgba(255, 255, 255, 0.06);
        }

        .avail-day-btn.select-all:hover {
            color: var(--primary);
            background: var(--primary-subtle);
        }

        .avail-day-btn.clear:hover {
            color: var(--danger);
            background: var(--danger-subtle);
        }

        /* Save bar */
        .avail-save-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: var(--s-4);
            padding: var(--s-4);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
        }

        .avail-legend {
            display: flex;
            gap: var(--s-4);
            align-items: center;
            font-size: 0.78rem;
            color: var(--text-faint);
        }

        .avail-legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }

        .avail-legend-dot.available {
            background: var(--primary);
            box-shadow: 0 0 6px rgba(0, 230, 118, 0.4);
        }

        .avail-legend-dot.unavailable {
            background: var(--border-strong);
        }

        /* Saving state */
        .avail-saving {
            opacity: 0.6;
            pointer-events: none;
        }

        @keyframes avail-saved-pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.3);
            }

            70% {
                box-shadow: 0 0 0 8px rgba(0, 230, 118, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(0, 230, 118, 0);
            }
        }

        @media (max-width: 768px) {
            .pitch-manage-card {
                flex-direction: column;
            }

            .pitch-manage-actions {
                align-self: flex-end;
            }

            .avail-grid {
                min-width: 580px;
            }

            .avail-save-bar {
                flex-direction: column;
                gap: var(--s-3);
            }
        }

        /* Manual add button */
        .avail-manual-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--r-md);
            background: var(--bg-elevated);
            border: 1px solid var(--border-strong);
            color: var(--text-p);
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--t-fast);
        }

        .avail-manual-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-subtle);
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div id="navbar"></div>
        <section class="main-content">
            <div class="container" id="dashContent"></div>
        </section>
        <div id="footer"></div>
    </div>

    <!-- Add/Edit Pitch Modal -->
    <div class="modal-overlay" id="pitchModal">
        <div class="modal" style="max-width:560px;">
            <div id="pitchModalContent"></div>
        </div>
    </div>

    <!-- Match Result Modal -->
    <div class="modal-overlay" id="resultModal">
        <div class="modal" style="max-width:500px; padding: var(--s-6);">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--s-5);">
                <h3 style="margin:0;">🏆 Record Match Result</h3>
                <button class="btn btn-ghost btn-sm" onclick="closeResultModal()" style="font-size:1.2rem;">✕</button>
            </div>

            <input type="hidden" id="matchTournamentId">

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Team A</label>
                    <select class="form-select" id="matchTeamA" title="Select Team A"></select>
                </div>
                <div class="form-group">
                    <label class="form-label">Score A</label>
                    <input type="number" class="form-input" id="scoreA" value="0" min="0" title="Score for Team A">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Team B</label>
                    <select class="form-select" id="matchTeamB" title="Select Team B"></select>
                </div>
                <div class="form-group">
                    <label class="form-label">Score B</label>
                    <input type="number" class="form-input" id="scoreB" value="0" min="0" title="Score for Team B">
                </div>
            </div>

            <p class="text-xs text-faint mt-4">Note: Scores will update global rankings automatically.</p>

            <button class="btn btn-primary btn-block mt-4" onclick="submitMatchResult()">Submit Result</button>
        </div>
    </div>

    <!-- Manual Availability Modal -->
    <div class="modal-overlay" id="manualAvailModal">
        <div class="modal" style="max-width:400px; padding: var(--s-6);">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--s-5);">
                <h3 style="margin:0;">🕐 Add Time Manually</h3>
                <button class="btn btn-ghost btn-sm" onclick="closeManualAvailModal()"
                    style="font-size:1.2rem;">✕</button>
            </div>

            <div class="form-group">
                <label class="form-label">Select Day</label>
                <select class="form-select" id="manualAvailDay" title="Select Day of Week">
                    <option value="Mon">Monday</option>
                    <option value="Tue">Tuesday</option>
                    <option value="Wed">Wednesday</option>
                    <option value="Thu">Thursday</option>
                    <option value="Fri">Friday</option>
                    <option value="Sat">Saturday</option>
                    <option value="Sun">Sunday</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Start Time</label>
                    <select class="form-select" id="manualAvailStart" title="Select Start Time"></select>
                </div>
                <div class="form-group">
                    <label class="form-label">End Time</label>
                    <select class="form-select" id="manualAvailEnd" title="Select End Time"></select>
                </div>
            </div>

            <div class="card"
                style="margin-top:var(--s-4); background:var(--bg-elevated); border:none; padding:var(--s-3);">
                <p class="text-xs text-faint" style="margin:0;">💡 This will mark all hourly slots in the selected range
                    as <b>Available</b> on the grid.</p>
            </div>

            <button class="btn btn-primary btn-block mt-5" onclick="submitManualAvail()">Add to Availability</button>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/roles.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/race-guard.js"></script>
    <script src="js/app.js"></script>
    <script>
        initPage('pitch-owner-dashboard');

        // ---- Access Control ----
        if (!Auth.isLoggedIn()) {
            window.location.href = 'login.html';
        } else if (!RolesManager.requireRoles(['pitch_owner'], 'dashContent')) {
            // Access denied message shown by requireRoles
        } else {
            initDashboard();
        }

        function initDashboard() {
            const user = Auth.getCurrentUser();

            // ---- Constants ----
            const DAYS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const HOURS = [
                { label: '12:00 AM', h24: 0 },
                { label: '1:00 AM', h24: 1 },
                { label: '2:00 AM', h24: 2 },
                { label: '3:00 AM', h24: 3 },
                { label: '4:00 AM', h24: 4 },
                { label: '5:00 AM', h24: 5 },
                { label: '6:00 AM', h24: 6 },
                { label: '7:00 AM', h24: 7 },
                { label: '8:00 AM', h24: 8 },
                { label: '9:00 AM', h24: 9 },
                { label: '10:00 AM', h24: 10 },
                { label: '11:00 AM', h24: 11 },
                { label: '12:00 PM', h24: 12 },
                { label: '1:00 PM', h24: 13 },
                { label: '2:00 PM', h24: 14 },
                { label: '3:00 PM', h24: 15 },
                { label: '4:00 PM', h24: 16 },
                { label: '5:00 PM', h24: 17 },
                { label: '6:00 PM', h24: 18 },
                { label: '7:00 PM', h24: 19 },
                { label: '8:00 PM', h24: 20 },
                { label: '9:00 PM', h24: 21 },
                { label: '10:00 PM', h24: 22 },
                { label: '11:00 PM', h24: 23 }
            ];

            let selectedAvailPitch = null;
            let availGrid = {}; // { "Mon_8": true, "Mon_9": false, ... }

            function render() {
                HOURS.forEach(h => {
                    const startOpt = document.createElement('option');
                    startOpt.value = h.h24;
                    startOpt.textContent = h.label;
                    document.getElementById('manualAvailStart').appendChild(startOpt);

                    const endOpt = document.createElement('option');
                    endOpt.value = h.h24 + 1;
                    // For the label, we can compute h+1 label
                    let nextHour = h.h24 + 1;
                    let label = "";
                    if (nextHour === 12) label = "12:00 PM";
                    else if (nextHour === 24) label = "12:00 AM";
                    else if (nextHour > 12) label = (nextHour - 12) + ":00 PM";
                    else label = nextHour + ":00 AM";

                    endOpt.textContent = label;
                    document.getElementById('manualAvailEnd').appendChild(endOpt);
                });

                document.getElementById('manualAvailStart').value = 10;
                document.getElementById('manualAvailEnd').value = 14;

                const myPitches = PitchesStore.filter(p => p.ownerId === user.id);
                const myPitchIds = myPitches.map(p => p.id);
                const allBookings = BookingsStore.filter(b => myPitchIds.includes(b.pitchId));
                const pendingBookings = allBookings.filter(b => b.status === 'pending');
                const confirmedBookings = allBookings.filter(b => b.status === 'confirmed');
                const rejectedBookings = allBookings.filter(b => b.status === 'rejected');
                const totalRevenue = confirmedBookings.reduce((sum, b) => sum + (b.totalPrice || 0), 0);

                document.getElementById('dashContent').innerHTML = `
                    <div class="dash-header">
                        <div>
                            <h1>🏟️ Pitch Owner Dashboard</h1>
                            <p class="text-faint">Manage your pitches, availability, and booking requests</p>
                        </div>
                        <button class="btn btn-primary btn-sm" onclick="openAddPitchModal()">+ Add New Pitch</button>
                    </div>

                    <!-- Stats -->
                    <div class="grid grid-4 mb-3">
                        <div class="stat-card animate-in">
                            <div class="stat-value">${myPitches.length}</div>
                            <div class="stat-label">My Pitches</div>
                        </div>
                        <div class="stat-card animate-in animate-delay-1">
                            <div class="stat-value" style="color:var(--warning);">${pendingBookings.length}</div>
                            <div class="stat-label">Pending Requests</div>
                        </div>
                        <div class="stat-card animate-in animate-delay-2">
                            <div class="stat-value" style="color:var(--accent);">${confirmedBookings.length}</div>
                            <div class="stat-label">Confirmed Bookings</div>
                        </div>
                        <div class="stat-card animate-in animate-delay-3">
                            <div class="stat-value" style="color:var(--accent);">${totalRevenue.toLocaleString()}</div>
                            <div class="stat-label">Total Revenue (EGP)</div>
                        </div>
                    </div>

                    <!-- Quick Actions -->
                    <div class="quick-action-bar animate-in">
                        <button class="btn btn-primary btn-sm" onclick="openAddPitchModal()">🏟️ Add Pitch</button>
                        <button class="btn btn-accent btn-sm" onclick="switchTab('bookings')">📋 View Bookings</button>
                        <button class="btn btn-secondary btn-sm" onclick="switchTab('availability')">🕐 Set Availability</button>
                        <span class="badge badge-primary" style="margin-left:auto;padding:8px 14px;">
                            🏟️ ${myPitches.length} Pitch${myPitches.length !== 1 ? 'es' : ''}
                        </span>
                    </div>

                    <!-- Tabs -->
                    <div class="dash-tabs">
                        <button class="dash-tab active" onclick="switchTab('pitches')">🏟️ My Pitches (${myPitches.length})</button>
                        <button class="dash-tab" onclick="switchTab('availability')">🕐 Availability</button>
                        <button class="dash-tab" onclick="switchTab('tournaments')">🏆 Tournaments</button>
                        <button class="dash-tab" onclick="switchTab('bookings')">📋 Bookings (${allBookings.length})</button>
                        <button class="dash-tab" onclick="switchTab('pending')">⏳ Pending (${pendingBookings.length})</button>
                    </div>

                    <!-- Pitches Tab -->
                    <div class="tab-content active" id="tab-pitches">
                        ${myPitches.length === 0
                        ? `<div class="card text-center" style="padding:var(--s-16);">
                                <h3>🏟️ No Pitches Yet</h3>
                                <p class="text-faint mt-1">Add your first pitch to start receiving bookings.</p>
                                <button class="btn btn-primary btn-lg mt-3" onclick="openAddPitchModal()">+ Add Pitch</button>
                            </div>`
                        : `<div class="card" style="padding:0;overflow:hidden;">
                            ${myPitches.map(p => {
                            const pitchBookings = allBookings.filter(b => b.pitchId === p.id);
                            const pitchPending = pitchBookings.filter(b => b.status === 'pending').length;
                            const isAvailable = p.available !== false;
                            const slotCount = p.availableSlots ? Object.values(p.availableSlots).filter(Boolean).length : 0;
                            return `
                                <div class="pitch-manage-card">
                                    <div class="pitch-manage-icon">${p.sport === 'basketball' ? '🏀' : p.sport === 'padel' ? '🎾' : '⚽'}</div>
                                    <div class="pitch-manage-info">
                                        <h4>${p.name}</h4>
                                        <div class="text-sm text-faint">${p.location}</div>
                                        <div style="display:flex;gap:var(--s-2);margin-top:var(--s-2);flex-wrap:wrap;">
                                            <span class="badge badge-accent">${(p.sport || 'football').toUpperCase()}</span>
                                            <span class="badge badge-primary">${p.type}</span>
                                            <span class="badge badge-neutral">${p.capacity} players</span>
                                            <span class="badge badge-neutral">${p.pricePerHour} EGP/hr</span>
                                            ${slotCount > 0 ? `<span class="badge badge-accent">${slotCount} slots</span>` : ''}
                                            ${pitchPending > 0 ? `<span class="badge badge-warning">${pitchPending} pending</span>` : ''}
                                        </div>
                                    </div>
                                    <div class="pitch-manage-actions">
                                        <button class="avail-toggle ${isAvailable ? 'available' : 'unavailable'}"
                                            onclick="toggleAvailability('${p.id}')">
                                            ${isAvailable ? '🟢 Available' : '🔴 Unavailable'}
                                        </button>
                                        <button class="btn btn-ghost btn-sm" onclick="deletePitch('${p.id}')" title="Delete">🗑️</button>
                                    </div>
                                </div>`;
                        }).join('')}
                        </div>`}
                    </div>

                    <!-- Availability Tab (NEW) -->
                    <div class="tab-content" id="tab-availability">
                        <div class="card">
                            <h3 style="margin-bottom:var(--s-2);">🕐 Set Weekly Availability</h3>
                            <p class="text-sm text-faint" style="margin-bottom:var(--s-5);">Click time slots to toggle available (green) / unavailable (gray). Changes are saved per pitch.</p>

                            ${myPitches.length === 0
                        ? `<p class="text-faint text-center" style="padding:var(--s-6);">Add a pitch first to set availability.</p>`
                        : `
                            <div class="avail-pitch-selector" id="availPitchSelector">
                                ${myPitches.map((p, i) => `
                                    <button class="avail-pitch-btn ${i === 0 ? 'active' : ''}" 
                                            onclick="selectAvailPitch('${p.id}', this)"
                                            data-pitch-id="${p.id}">
                                        ${p.sport === 'basketball' ? '🏀' : p.sport === 'padel' ? '🎾' : '⚽'} ${p.name}
                                    </button>
                                `).join('')}
                            </div>

                            <div class="avail-grid-wrapper" id="availGridWrapper">
                                <!-- Grid renders dynamically -->
                            </div>

                            <div class="avail-save-bar">
                                <div class="avail-legend">
                                    <span><span class="avail-legend-dot available"></span> Available</span>
                                    <span><span class="avail-legend-dot unavailable"></span> Unavailable</span>
                                </div>
                                <div style="display:flex; gap:var(--s-2);">
                                    <button class="avail-manual-btn" onclick="openManualAvailModal()">
                                        ➕ Add Time Manually
                                    </button>
                                    <button class="btn btn-primary btn-sm" id="saveAvailBtn" onclick="saveAvailability()">
                                        💾 Save Availability
                                    </button>
                                </div>
                            </div>
                            `}
                        </div>
                    </div>

                    <!-- Bookings Tab (All) -->
                    <div class="tab-content" id="tab-bookings">
                        <div class="card">
                            <h3 style="margin-bottom:var(--s-5);">All Bookings</h3>
                            ${allBookings.length === 0
                        ? '<p class="text-faint text-center" style="padding:var(--s-6);">No bookings received yet.</p>'
                        : `<div class="table-wrapper"><table>
                                <thead><tr><th>Pitch</th><th>Player</th><th>Date</th><th>Time</th><th>Price</th><th>Status</th><th>Actions</th></tr></thead>
                                <tbody>${allBookings.map(b => {
                            const p = PitchesStore.getById(b.pitchId);
                            const player = getUserById(b.playerId);
                            const sc = b.status === 'confirmed' ? 'badge-accent' : b.status === 'pending' ? 'badge-warning' : 'badge-danger';
                            return `<tr>
                                        <td><strong style="color:var(--text-h);">${p ? p.name : '—'}</strong></td>
                                        <td>${player ? player.name : '—'}</td>
                                        <td>${formatDate(b.date)}</td>
                                        <td>${b.timeSlot}</td>
                                        <td>${b.totalPrice} EGP</td>
                                        <td><span class="badge ${sc}">${b.status}</span></td>
                                        <td>
                                            ${b.status === 'pending' ? `
                                                <button class="btn btn-accent btn-sm" onclick="updateBookingStatus('${b.id}', 'confirmed')">✓</button>
                                                <button class="btn btn-secondary btn-sm" onclick="updateBookingStatus('${b.id}', 'rejected')">✕</button>
                                            ` : '—'}
                                        </td>
                                    </tr>`;
                        }).join('')}</tbody>
                            </table></div>`}
                        </div>
                    </div>

                    <!-- Pending Tab -->
                    <div class="tab-content" id="tab-pending">
                        <div class="card">
                            <h3 style="margin-bottom:var(--s-5);">Pending Booking Requests</h3>
                            ${pendingBookings.length === 0
                        ? '<p class="text-faint text-center" style="padding:var(--s-6);">No pending requests. 🎉</p>'
                        : pendingBookings.map(b => {
                            const p = PitchesStore.getById(b.pitchId);
                            const player = getUserById(b.playerId);
                            const coach = b.coachId ? CoachesStore.getById(b.coachId) : null;
                            const coachUser = coach ? getUserById(coach.userId) : null;
                            return `
                                <div class="booking-req">
                                    <div class="booking-req-info">
                                        <div style="font-weight:700;color:var(--text-h);">${player ? player.name : 'Unknown'}</div>
                                        <div class="text-sm text-faint">${p ? p.name : '—'} · ${formatDate(b.date)} · ${b.timeSlot}</div>
                                        <div class="text-sm text-faint">${coachUser ? 'Coach: ' + coachUser.name : 'No Coach'} · ${b.totalPrice} EGP</div>
                                    </div>
                                    <div class="booking-req-actions">
                                        <button class="btn btn-accent btn-sm" onclick="updateBookingStatus('${b.id}', 'confirmed')">✓ Accept</button>
                                        <button class="btn btn-secondary btn-sm" onclick="updateBookingStatus('${b.id}', 'rejected')">✕ Reject</button>
                                    </div>
                                </div>`;
                        }).join('')}
                        </div>
                    </div>

                    <!-- Tournaments Tab (NEW) -->
                    <div class="tab-content" id="tab-tournaments">
                        <div class="card">
                            <h3 style="margin-bottom:var(--s-5);">Manage My Tournaments</h3>
                            <div class="grid grid-2">
                                ${TournamentsStore.filter(t => t.organizerId === user.id).map(t => `
                                    <div class="card" style="border:1px solid var(--border-strong);">
                                        <div class="flex-between">
                                            <strong>${t.name}</strong>
                                            <span class="badge badge-accent">${t.status}</span>
                                        </div>
                                        <div class="text-sm text-faint mt-2">📅 ${formatDate(t.startDate)}</div>
                                        <div class="text-sm text-faint">👥 ${t.teams.length}/${t.maxTeams} teams</div>
                                        <div style="margin-top:var(--s-4); display:flex; gap:var(--s-2);">
                                            <button class="btn btn-primary btn-sm btn-block" onclick="openRecordMatchModal('${t.id}')">Record Match Result</button>
                                        </div>
                                    </div>
                                `).join('')}
                                ${TournamentsStore.filter(t => t.organizerId === user.id).length === 0 ? '<p class="text-faint">You haven\'t created any tournaments yet.</p>' : ''}
                            </div>
                        </div>
                    </div>
                `;

                // Auto-select first pitch for availability
                if (myPitches.length > 0 && !selectedAvailPitch) {
                    selectedAvailPitch = myPitches[0].id;
                }
                if (selectedAvailPitch) {
                    loadAvailGrid(selectedAvailPitch);
                }
            }

            render();

            // ---- Tab Switching ----
            window.switchTab = function (tab) {
                document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                const tabs = document.querySelectorAll('.dash-tab');
                const tabIds = ['pitches', 'availability', 'tournaments', 'bookings', 'pending'];
                const idx = tabIds.indexOf(tab);
                if (idx >= 0 && tabs[idx]) tabs[idx].classList.add('active');
                const el = document.getElementById('tab-' + tab);
                if (el) el.classList.add('active');
            };

            // ---- Toggle Global Availability ----
            window.toggleAvailability = function (pitchId) {
                const pitch = PitchesStore.getById(pitchId);
                if (!pitch) return;
                const newAvail = pitch.available === false ? true : false;
                PitchesStore.update(pitchId, { available: newAvail });
                showToast(`${pitch.name} is now ${newAvail ? 'available' : 'unavailable'}`, 'success');
                render();
            };

            // ---- Accept/Reject Booking ----
            window.updateBookingStatus = function (bookingId, status) {
                BookingsStore.update(bookingId, { status });
                showToast(`Booking ${status}!`, status === 'confirmed' ? 'success' : 'info');
                render();
            };

            // ---- Delete Pitch ----
            window.deletePitch = function (pitchId) {
                if (!confirm('Are you sure you want to delete this pitch?')) return;
                PitchesStore.delete(pitchId);
                if (selectedAvailPitch === pitchId) selectedAvailPitch = null;
                showToast('Pitch deleted', 'info');
                render();
            };

            // ============================================
            // AVAILABILITY GRID SYSTEM
            // ============================================

            /** Select a pitch in the availability tab */
            window.selectAvailPitch = function (pitchId, btn) {
                selectedAvailPitch = pitchId;
                document.querySelectorAll('.avail-pitch-btn').forEach(b => b.classList.remove('active'));
                if (btn) btn.classList.add('active');
                loadAvailGrid(pitchId);
            };

            /** Load availability grid from pitch data */
            function loadAvailGrid(pitchId) {
                const pitch = PitchesStore.getById(pitchId);
                if (!pitch) return;

                // Initialize from stored data or empty
                availGrid = {};
                const stored = pitch.availableSlots || {};
                DAYS.forEach(day => {
                    HOURS.forEach(hour => {
                        const key = `${day}_${hour.h24}`;
                        availGrid[key] = !!stored[key];
                    });
                });

                renderAvailGrid();
            }

            /** Render the visual grid */
            function renderAvailGrid() {
                const wrapper = document.getElementById('availGridWrapper');
                if (!wrapper) return;

                let html = '<div class="avail-grid">';

                // Header row: empty cell + day names
                html += '<div class="avail-grid-header" style="border-right: 1px solid var(--border);">Time</div>';
                DAYS.forEach(day => {
                    html += `<div class="avail-grid-header">${day}</div>`;
                });

                // Quick actions row
                html += '<div class="avail-day-actions" style="border-right: 1px solid var(--border);"><span class="avail-day-btn" style="cursor:default;color:var(--text-h);">⚡</span></div>';
                DAYS.forEach(day => {
                    html += `<div class="avail-day-actions">
                        <button class="avail-day-btn select-all" onclick="selectAllDay('${day}')" title="Select all ${day}">All</button>
                        <button class="avail-day-btn clear" onclick="clearDay('${day}')" title="Clear ${day}">Clear</button>
                    </div>`;
                });

                // Time rows
                HOURS.forEach(hour => {
                    html += `<div class="avail-grid-time">${hour.label}</div>`;
                    DAYS.forEach(day => {
                        const key = `${day}_${hour.h24}`;
                        const isActive = availGrid[key];
                        html += `<div class="avail-slot ${isActive ? 'active' : ''}" 
                                      onclick="toggleSlot('${key}')" 
                                      id="slot-${key}"
                                      title="${hour.label} — ${day}"></div>`;
                    });
                });

                html += '</div>';
                wrapper.innerHTML = html;
            }

            /** Toggle a single slot */
            window.toggleSlot = function (key) {
                availGrid[key] = !availGrid[key];
                const el = document.getElementById('slot-' + key);
                if (el) {
                    el.classList.toggle('active', availGrid[key]);
                }
            };

            /** Select all slots for a day */
            window.selectAllDay = function (day) {
                HOURS.forEach(hour => {
                    const key = `${day}_${hour.h24}`;
                    availGrid[key] = true;
                    const el = document.getElementById('slot-' + key);
                    if (el) el.classList.add('active');
                });
            };

            /** Clear all slots for a day */
            window.clearDay = function (day) {
                HOURS.forEach(hour => {
                    const key = `${day}_${hour.h24}`;
                    availGrid[key] = false;
                    const el = document.getElementById('slot-' + key);
                    if (el) el.classList.remove('active');
                });
            };

            /** Save availability to store (race-condition protected) */
            window.saveAvailability = function () {
                if (!selectedAvailPitch) { showToast('Select a pitch first', 'error'); return; }

                const lockKey = `avail_save_${selectedAvailPitch}`;
                if (!RaceGuard.acquire(lockKey, 1500)) {
                    showToast('Please wait...', 'warning');
                    return;
                }

                const saveBtn = document.getElementById('saveAvailBtn');
                const gridWrapper = document.getElementById('availGridWrapper');

                // Loading state
                if (saveBtn) saveBtn.textContent = '⏳ Saving...';
                if (gridWrapper) gridWrapper.classList.add('avail-saving');

                // Simulated async delay for UX feedback
                setTimeout(() => {
                    try {
                        // Build slots object (only save active slots to keep storage lean)
                        const slots = {};
                        let activeCount = 0;
                        Object.entries(availGrid).forEach(([key, val]) => {
                            if (val) {
                                slots[key] = true;
                                activeCount++;
                            }
                        });

                        // Update pitch with new availability data
                        PitchesStore.update(selectedAvailPitch, {
                            availableSlots: slots,
                            available: activeCount > 0 // auto-set global availability
                        });

                        if (saveBtn) {
                            saveBtn.textContent = '✅ Saved!';
                            saveBtn.style.animation = 'avail-saved-pulse 0.6s ease';
                            setTimeout(() => {
                                if (saveBtn) {
                                    saveBtn.textContent = '💾 Save Availability';
                                    saveBtn.style.animation = '';
                                }
                            }, 1500);
                        }
                        if (gridWrapper) gridWrapper.classList.remove('avail-saving');

                        showToast(`Availability saved! ${activeCount} slot${activeCount !== 1 ? 's' : ''} active.`, 'success');
                    } finally {
                        RaceGuard.release(lockKey);
                    }
                }, 200);
            };


            window.openAddPitchModal = function () {
                document.getElementById('pitchModalContent').innerHTML = `
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--s-5);">
                        <h3>🏟️ Add New Pitch</h3>
                        <button class="btn btn-ghost btn-sm" onclick="closePitchModal()" style="font-size:1.2rem;">✕</button>
                    </div>
                    <div class="form-section">
                        <div class="form-group">
                            <label class="form-label">Sport Type *</label>
                            <select class="form-select" id="pitchSport" onchange="updatePitchTypeOptions(this.value)">
                                <option value="football">⚽ Football</option>
                                <option value="padel">🎾 Padel</option>
                                <option value="basketball">🏀 Basketball</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Pitch Name *</label>
                            <input class="form-input" id="pitchName" placeholder="e.g. Green Arena" maxlength="50">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Location *</label>
                            <input class="form-input" id="pitchLocation" placeholder="e.g. Nasr City, Cairo">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Pitch Format *</label>
                                <select class="form-select" id="pitchType">
                                    <option value="5-a-side">5-a-side</option>
                                    <option value="7-a-side">7-a-side</option>
                                    <option value="11-a-side">11-a-side</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Price per Hour (EGP) *</label>
                                <input class="form-input" type="number" id="pitchPrice" min="50" step="50" placeholder="250">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Player Capacity *</label>
                            <input class="form-input" type="number" id="pitchCapacity" min="2" max="30" value="10">
                        </div>
                    </div>
                    <button class="btn btn-primary btn-block" onclick="submitPitch()">Publish Pitch</button>
                `;
                document.getElementById('pitchModal').classList.add('active');
            };

            window.updatePitchTypeOptions = function (sport) {
                const typeSelect = document.getElementById('pitchType');
                const capInput = document.getElementById('pitchCapacity');
                typeSelect.innerHTML = '';

                if (sport === 'football') {
                    typeSelect.innerHTML = `
                        <option value="5-a-side">5-a-side</option>
                        <option value="7-a-side">7-a-side</option>
                        <option value="11-a-side">11-a-side</option>
                    `;
                    capInput.value = 10;
                } else if (sport === 'padel') {
                    typeSelect.innerHTML = `
                        <option value="Double Court">Double Court (4 Players)</option>
                        <option value="Single Court">Single Court (2 Players)</option>
                    `;
                    capInput.value = 4;
                } else if (sport === 'basketball') {
                    typeSelect.innerHTML = `
                        <option value="Full Court">Full Court</option>
                        <option value="Half Court">Half Court</option>
                    `;
                    capInput.value = 10;
                }
            };

            window.closePitchModal = function () {
                document.getElementById('pitchModal').classList.remove('active');
            };


            window.submitPitch = function () {
                const sport = document.getElementById('pitchSport').value;
                const name = document.getElementById('pitchName').value.trim();
                const location = document.getElementById('pitchLocation').value.trim();
                const type = document.getElementById('pitchType').value;
                const price = parseInt(document.getElementById('pitchPrice').value);
                const capacity = parseInt(document.getElementById('pitchCapacity').value);

                if (!name) { showToast('Pitch name is required', 'error'); return; }
                if (!location) { showToast('Location is required', 'error'); return; }
                if (!price || price < 50) { showToast('Price must be at least 50 EGP', 'error'); return; }
                if (!capacity || capacity < 2) { showToast('Capacity must be at least 2', 'error'); return; }

                PitchesStore.add({
                    sport, name, location, type,
                    pricePerHour: price,
                    capacity: capacity,
                    ownerId: user.id,
                    rating: 0,
                    available: true,
                    availableSlots: {},
                    image: ''
                });

                closePitchModal();
                showToast('Pitch published! 🏟️', 'success');
                render();
            };

            // ---- Initialize Manual Modal Options ----
            const startSelect = document.getElementById('manualAvailStart');
            const endSelect = document.getElementById('manualAvailEnd');
            if (startSelect && endSelect) {
                startSelect.innerHTML = '';
                endSelect.innerHTML = '';
                HOURS.forEach(h => {
                    const startOpt = document.createElement('option');
                    startOpt.value = h.h24;
                    startOpt.textContent = h.label;
                    startSelect.appendChild(startOpt);

                    const endOpt = document.createElement('option');
                    endOpt.value = h.h24 + 1;
                    let nextHour = h.h24 + 1;
                    let label = "";
                    if (nextHour === 12) label = "12:00 PM";
                    else if (nextHour === 24) label = "12:00 AM";
                    else if (nextHour > 12) label = (nextHour - 12) + ":00 PM";
                    else label = nextHour + ":00 AM";
                    endOpt.textContent = label;
                    endSelect.appendChild(endOpt);
                });
                startSelect.value = 10;
                endSelect.value = 14;
            }

            // ============================================
            // MANUAL AVAILABILITY FEATURE
            // ============================================

            window.openManualAvailModal = function () {
                if (!selectedAvailPitch) {
                    showToast('Please select a pitch first', 'warning');
                    return;
                }
                document.getElementById('manualAvailModal').classList.add('active');
            };

            window.closeManualAvailModal = function () {
                document.getElementById('manualAvailModal').classList.remove('active');
            };

            window.submitManualAvail = function () {
                const day = document.getElementById('manualAvailDay').value;
                const start = parseInt(document.getElementById('manualAvailStart').value);
                const end = parseInt(document.getElementById('manualAvailEnd').value);

                if (start >= end) {
                    showToast('End time must be after start time', 'error');
                    return;
                }

                // Map range to availGrid slots
                let addedCount = 0;
                for (let h = start; h < end; h++) {
                    const key = `${day}_${h}`;
                    if (!availGrid[key]) {
                        availGrid[key] = true;
                        addedCount++;
                    }
                }

                if (addedCount === 0) {
                    showToast('Selected slots already available', 'info');
                } else {
                    showToast(`Successfully added ${addedCount} slots to ${day}`, 'success');
                    renderAvailGrid(); // Refresh the visual grid
                }

                closeManualAvailModal();
            };

            // ============================================
            // TOURNAMENT MATCH RECORDING
            // ============================================

            window.openRecordMatchModal = function (tournamentId) {
                const t = TournamentsStore.getById(tournamentId);
                if (!t) return;

                document.getElementById('matchTournamentId').value = tournamentId;
                const teamA = document.getElementById('matchTeamA');
                const teamB = document.getElementById('matchTeamB');

                const teamsHtml = t.teams.map(name => `<option value="${name}">${name}</option>`).join('');
                teamA.innerHTML = teamsHtml;
                teamB.innerHTML = teamsHtml;

                document.getElementById('resultModal').classList.add('active');
            };

            window.closeResultModal = function () {
                document.getElementById('resultModal').classList.remove('active');
            };

            window.submitMatchResult = function () {
                const tournamentId = document.getElementById('matchTournamentId').value;
                const teamA = document.getElementById('matchTeamA').value;
                const teamB = document.getElementById('matchTeamB').value;
                const scoreA = parseInt(document.getElementById('scoreA').value);
                const scoreB = parseInt(document.getElementById('scoreB').value);

                if (teamA === teamB) {
                    showToast('Teams must be different', 'error');
                    return;
                }

                // Add to Match Store
                const matchResult = TournamentMatchesStore.add({
                    tournamentId,
                    team1: { name: teamA, score: scoreA, scorers: [] },
                    team2: { name: teamB, score: scoreB, scorers: [] },
                    date: new Date().toISOString().split('T')[0],
                    processed: false,
                    sportModule: 'football'
                });

                // Apply rankings (Simple version: Team win/participation)
                // In a full version, we would collect player IDs for each team.
                // For MVP: Find players registered for these teams in the tournament
                const t = TournamentsStore.getById(tournamentId);
                const playerTeams = t.playerTeams || {};
                const allPlayersInMatch = Object.entries(playerTeams)
                    .filter(([pid, tname]) => tname === teamA || tname === teamB)
                    .map(([pid]) => pid);

                RankingManager.processMatchResult(matchResult.id, {
                    team1: { scorers: [] },
                    team2: { scorers: [] },
                    allPlayerIds: allPlayersInMatch
                }, 'tournament');

                showToast('Match result saved and rankings updated!', 'success');
                closeResultModal();
                render();
            };
        }

        // Click outside modal to close
        document.getElementById('pitchModal').addEventListener('click', function (e) {
            if (e.target === this) window.closePitchModal?.();
        });
        document.getElementById('manualAvailModal').addEventListener('click', function (e) {
            if (e.target === this) window.closeManualAvailModal?.();
        });
        document.getElementById('resultModal').addEventListener('click', function (e) {
            if (e.target === this) window.closeResultModal?.();
        });
    </script>
</body>

</html>
