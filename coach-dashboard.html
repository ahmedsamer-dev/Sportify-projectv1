<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Coach dashboard on SPORTIFY. Manage your profile, sessions, and training schedule.">
    <title>Coach Dashboard — SPORTIFY</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: var(--s-4);
            margin-bottom: var(--s-6);
        }

        .dash-header h1 {
            font-size: 1.5rem;
        }

        .dash-tabs {
            display: flex;
            gap: var(--s-1);
            border-bottom: 1px solid var(--border);
            margin-bottom: var(--s-6);
        }

        .dash-tab {
            padding: var(--s-3) var(--s-5);
            border: none;
            background: none;
            color: var(--text-faint);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all var(--t-fast);
        }

        .dash-tab:hover {
            color: var(--text-p);
        }

        .dash-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Profile edit section */
        .coach-profile-hero {
            display: flex;
            gap: var(--s-6);
            align-items: center;
            flex-wrap: wrap;
            padding: var(--s-6);
            background: linear-gradient(135deg, var(--primary-subtle), var(--bg-card));
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            margin-bottom: var(--s-6);
        }

        .coach-avatar-big {
            width: 80px;
            height: 80px;
            border-radius: var(--r-full);
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.8rem;
            color: white;
            flex-shrink: 0;
        }

        .coach-profile-info {
            flex: 1;
            min-width: 200px;
        }

        .coach-profile-info h2 {
            margin-bottom: 4px;
        }

        /* Session card */
        .session-card {
            display: flex;
            gap: var(--s-4);
            padding: var(--s-4);
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        .session-card:last-child {
            border-bottom: none;
        }

        .session-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .session-info {
            flex: 1;
            min-width: 0;
        }

        /* Quick actions */
        .quick-action-bar {
            display: flex;
            gap: var(--s-3);
            padding: var(--s-4);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            margin-bottom: var(--s-6);
            flex-wrap: wrap;
        }

        .role-badge-big {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: var(--r-full);
            font-size: 0.82rem;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            .coach-profile-hero {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div id="navbar"></div>
        <section class="main-content">
            <div class="container" id="dashContent"></div>
        </section>
        <div id="footer"></div>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal" style="max-width:520px;">
            <div id="editModalContent"></div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/roles.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        initPage('coach-dashboard');

        // ---- Access Control ----
        if (!Auth.isLoggedIn()) {
            window.location.href = 'login.html';
        } else if (!RolesManager.requireRoles(['coach'], 'dashContent')) {
            // Access denied
        } else {
            initDashboard();
        }

        function initDashboard() {
            const user = Auth.getCurrentUser();
            const coach = getCoachByUserId(user.id);

            function render() {
                const freshCoach = getCoachByUserId(user.id);
                // Coach Training Bookings (independent from pitch bookings)
                const myBookings = freshCoach ? CoachBookingsStore.filter(b => b.coachId === freshCoach.id) : [];
                const pendingBookings = myBookings.filter(b => b.status === 'pending');
                const confirmedBookings = myBookings.filter(b => b.status === 'confirmed');
                const upcomingBookings = confirmedBookings.filter(b => new Date(b.date) >= new Date());
                const completedBookings = confirmedBookings.filter(b => new Date(b.date) < new Date());
                const totalEarnings = confirmedBookings.reduce((sum, b) => sum + (b.price || 0), 0);

                // Check if coach has academies
                const hasAcademy = RolesManager.isCoachWithAcademy(user);
                const myAcademies = AcademiesStore.filter(a => a.coachUserId === user.id);
                const totalStudents = myAcademies.reduce((sum, a) =>
                    sum + EnrollmentsStore.filter(e => e.academyId === a.id && e.status === 'active').length, 0
                );

                document.getElementById('dashContent').innerHTML = `
                    <div class="dash-header">
                        <div>
                            <h1>🧑‍🏫 Coach Dashboard</h1>
                            <p class="text-faint">Manage your coaching profile, sessions, and training</p>
                        </div>
                        <div style="display:flex;gap:var(--s-2);flex-wrap:wrap;">
                            ${hasAcademy
                        ? '<a href="academy-dashboard.html" class="btn btn-outline btn-sm">🎓 Academy Dashboard</a>'
                        : '<a href="academy-create.html" class="btn btn-outline btn-sm">🎓 Create Academy</a>'}
                            <a href="profile.html" class="btn btn-secondary btn-sm">👤 Profile</a>
                        </div>
                    </div>

                    <!-- Coach Profile Hero -->
                    <div class="coach-profile-hero animate-in">
                        <div class="coach-avatar-big">${user.name.charAt(0).toUpperCase()}</div>
                        <div class="coach-profile-info">
                            <h2>${user.name}</h2>
                            <div class="text-sm text-faint">${user.email} ${user.phone ? '· ' + user.phone : ''}</div>
                            <div style="display:flex;gap:var(--s-2);margin-top:var(--s-2);flex-wrap:wrap;">
                                ${RolesManager.getRoleBadgesHTML(user)}
                                ${hasAcademy ? '<span class="badge badge-primary">🎓 Academy Owner</span>' : ''}
                            </div>
                            ${freshCoach ? `
                            <div style="margin-top:var(--s-3);display:flex;gap:var(--s-4);flex-wrap:wrap;">
                                <div class="text-sm"><strong>Specialty:</strong> ${freshCoach.specialty}</div>
                                <div class="text-sm"><strong>Experience:</strong> ${freshCoach.experience} yrs</div>
                                <div class="text-sm"><strong>Rate:</strong> <span style="color:var(--accent);">${freshCoach.hourlyRate} EGP/hr</span></div>
                                <div class="text-sm" style="color:var(--warning);">${getStarRating(freshCoach.rating)} ${freshCoach.rating}</div>
                            </div>` : ''}
                        </div>
                        <button class="btn btn-primary btn-sm" onclick="openEditProfile()">✏️ Edit Profile</button>
                    </div>

                    <!-- Stats -->
                    <div class="grid grid-4 mb-3">
                        <div class="stat-card animate-in">
                            <div class="stat-value" style="color:var(--warning);">${pendingBookings.length}</div>
                            <div class="stat-label">Pending Requests</div>
                        </div>
                        <div class="stat-card animate-in animate-delay-1">
                            <div class="stat-value">${upcomingBookings.length}</div>
                            <div class="stat-label">Upcoming Sessions</div>
                        </div>
                        <div class="stat-card animate-in animate-delay-2">
                            <div class="stat-value" style="color:var(--accent);">${totalEarnings.toLocaleString()}</div>
                            <div class="stat-label">Total Earnings (EGP)</div>
                        </div>
                        <div class="stat-card animate-in animate-delay-3">
                            <div class="stat-value">${totalStudents}</div>
                            <div class="stat-label">Academy Students</div>
                        </div>
                    </div>

                    <!-- Quick Actions -->
                    <div class="quick-action-bar animate-in">
                        <button class="btn btn-primary btn-sm" onclick="openEditProfile()">✏️ Edit Profile</button>
                        ${!hasAcademy ? '<a href="academy-create.html" class="btn btn-accent btn-sm">🎓 Create Academy</a>' : ''}
                        ${hasAcademy ? '<a href="academy-dashboard.html" class="btn btn-accent btn-sm">🎓 Academy Dashboard</a>' : ''}
                        <span class="badge badge-info" style="margin-left:auto;padding:8px 14px;">
                            ${freshCoach ? '⭐ ' + freshCoach.rating + ' rating' : '🆕 New Coach'}
                        </span>
                    </div>

                    <!-- Tabs -->
                    <div class="dash-tabs">
                        <button class="dash-tab active" onclick="switchTab('sessions')">📋 Sessions (${myBookings.length})</button>
                        <button class="dash-tab" onclick="switchTab('upcoming')">⏰ Upcoming (${upcomingBookings.length})</button>
                        ${hasAcademy ? `<button class="dash-tab" onclick="switchTab('academies')">🎓 Academies (${myAcademies.length})</button>` : ''}
                    </div>

                    <!-- Sessions Tab -->
                    <div class="tab-content active" id="tab-sessions">
                        <div class="card">
                            <h3 style="margin-bottom:var(--s-5);">All Coaching Sessions</h3>
                            ${myBookings.length === 0
                        ? '<p class="text-faint text-center" style="padding:var(--s-6);">No coaching sessions yet. Players will find you on the booking page! 💪</p>'
                        : `<div class="table-wrapper"><table>
                                <thead><tr><th>Pitch</th><th>Player</th><th>Date</th><th>Time</th><th>Status</th></tr></thead>
                                <tbody>${myBookings.sort((a, b) => new Date(b.date) - new Date(a.date)).map(b => {
                            const p = PitchesStore.getById(b.pitchId);
                            const player = getUserById(b.playerId);
                            const sc = b.status === 'confirmed' ? 'badge-accent' : b.status === 'pending' ? 'badge-warning' : 'badge-danger';
                            return `<tr>
                                        <td><strong style="color:var(--text-h);">${p ? p.name : '—'}</strong><br><span class="text-xs text-faint">${p ? p.location : ''}</span></td>
                                        <td>${player ? player.name : '—'}</td>
                                        <td>${formatDate(b.date)}</td>
                                        <td>${b.timeSlot}</td>
                                        <td><span class="badge ${sc}">${b.status}</span></td>
                                    </tr>`;
                        }).join('')}</tbody>
                            </table></div>`}
                        </div>
                    </div>

                    <!-- Upcoming Tab -->
                    <div class="tab-content" id="tab-upcoming">
                        <div class="card">
                            <h3 style="margin-bottom:var(--s-5);">Upcoming Sessions</h3>
                            ${upcomingBookings.length === 0
                        ? '<p class="text-faint text-center" style="padding:var(--s-6);">No upcoming sessions. 📅</p>'
                        : `<div style="padding:0;overflow:hidden;">
                                ${upcomingBookings.sort((a, b) => new Date(a.date) - new Date(b.date)).map(b => {
                            const p = PitchesStore.getById(b.pitchId);
                            const player = getUserById(b.playerId);
                            return `
                                    <div class="session-card">
                                        <div class="session-icon" style="background:var(--accent-subtle);">📅</div>
                                        <div class="session-info">
                                            <div style="font-weight:700;color:var(--text-h);">${player ? player.name : 'Player'}</div>
                                            <div class="text-sm text-faint">${p ? p.name + ' — ' + p.location : ''}</div>
                                            <div class="text-sm">${formatDate(b.date)} · ${b.timeSlot}</div>
                                        </div>
                                        <span class="badge badge-accent">Confirmed</span>
                                    </div>`;
                        }).join('')}
                            </div>`}
                        </div>
                    </div>

                    <!-- Academies Tab (only if coach has academies) -->
                    ${hasAcademy ? `
                    <div class="tab-content" id="tab-academies">
                        <div class="card">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--s-5);">
                                <h3>🎓 My Academies</h3>
                                <a href="academy-create.html" class="btn btn-primary btn-sm">+ New Academy</a>
                            </div>
                            ${myAcademies.map(a => {
                            const enrollCount = EnrollmentsStore.filter(e => e.academyId === a.id && e.status === 'active').length;
                            return `
                                <div class="session-card">
                                    <div class="session-icon" style="background:var(--primary-subtle);">🎓</div>
                                    <div class="session-info">
                                        <div style="font-weight:700;color:var(--text-h);">${a.name}</div>
                                        <div class="text-sm text-faint">${a.category} · ${a.location}</div>
                                        <div style="display:flex;gap:var(--s-2);margin-top:4px;">
                                            <span class="badge badge-neutral">${enrollCount}/${a.maxCapacity} enrolled</span>
                                            <span class="badge ${a.status === 'active' ? 'badge-accent' : 'badge-warning'}">${a.status}</span>
                                        </div>
                                    </div>
                                    <a href="academy-dashboard.html" class="btn btn-outline btn-sm">Manage →</a>
                                </div>`;
                        }).join('')}
                        </div>
                    </div>` : ''}
                `;
            }

            render();

            // ---- Tab Switching ----
            window.switchTab = function (tab) {
                document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                const tabs = document.querySelectorAll('.dash-tab');
                const tabIds = ['sessions', 'upcoming', 'academies'];
                const idx = tabIds.indexOf(tab);
                if (idx >= 0 && tabs[idx]) tabs[idx].classList.add('active');
                const el = document.getElementById('tab-' + tab);
                if (el) el.classList.add('active');
            };

            // ---- Edit Profile Modal ----
            window.openEditProfile = function () {
                const freshCoach = getCoachByUserId(user.id);
                document.getElementById('editModalContent').innerHTML = `
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--s-5);">
                        <h3>✏️ Edit Coach Profile</h3>
                        <button class="btn btn-ghost btn-sm" onclick="closeEditModal()" style="font-size:1.2rem;">✕</button>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Specialty *</label>
                        <select class="form-select" id="editSpecialty">
                            ${['General', 'Attack & Finishing', 'Fitness & Conditioning', 'Defense & Tactics', 'Goalkeeping', 'Midfield & Passing', 'Youth Development'].map(s =>
                    `<option value="${s}" ${freshCoach && freshCoach.specialty === s ? 'selected' : ''}>${s}</option>`
                ).join('')}
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Experience (years) *</label>
                            <input class="form-input" type="number" id="editExp" min="0" max="50" value="${freshCoach ? freshCoach.experience : 0}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Hourly Rate (EGP) *</label>
                            <input class="form-input" type="number" id="editRate" min="50" step="25" value="${freshCoach ? freshCoach.hourlyRate : 100}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Bio</label>
                        <textarea class="form-textarea" id="editBio" rows="3" placeholder="Tell players about yourself...">${freshCoach ? freshCoach.bio : ''}</textarea>
                    </div>
                    <button class="btn btn-primary btn-block" onclick="saveProfile()">Save Changes</button>
                `;
                document.getElementById('editModal').classList.add('active');
            };

            window.closeEditModal = function () {
                document.getElementById('editModal').classList.remove('active');
            };

            window.saveProfile = function () {
                const freshCoach = getCoachByUserId(user.id);
                if (!freshCoach) { showToast('Coach profile not found', 'error'); return; }

                const specialty = document.getElementById('editSpecialty').value;
                const experience = parseInt(document.getElementById('editExp').value) || 0;
                const hourlyRate = parseInt(document.getElementById('editRate').value) || 100;
                const bio = document.getElementById('editBio').value.trim();

                CoachesStore.update(freshCoach.id, { specialty, experience, hourlyRate, bio });
                closeEditModal();
                showToast('Profile updated! ✨', 'success');
                render();
            };
        }

        // Click outside modal to close
        document.getElementById('editModal').addEventListener('click', function (e) {
            if (e.target === this) window.closeEditModal?.();
        });
    </script>
</body>

</html>
