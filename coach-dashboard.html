<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Coach dashboard on SPORTIFY. Manage your profile, sessions, and training schedule.">
    <title>Coach Dashboard — SPORTIFY</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: var(--s-4);
            margin-bottom: var(--s-6);
        }

        .dash-header h1 {
            font-size: 1.5rem;
        }

        .dash-tabs {
            display: flex;
            gap: var(--s-1);
            border-bottom: 1px solid var(--border);
            margin-bottom: var(--s-6);
        }

        .dash-tab {
            padding: var(--s-3) var(--s-5);
            border: none;
            background: none;
            color: var(--text-faint);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all var(--t-fast);
        }

        .dash-tab:hover {
            color: var(--text-p);
        }

        .dash-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Profile edit section */
        .coach-profile-hero {
            display: flex;
            gap: var(--s-6);
            align-items: center;
            flex-wrap: wrap;
            padding: var(--s-6);
            background: linear-gradient(135deg, var(--primary-subtle), var(--bg-card));
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            margin-bottom: var(--s-6);
        }

        .coach-avatar-big {
            width: 80px;
            height: 80px;
            border-radius: var(--r-full);
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.8rem;
            color: white;
            flex-shrink: 0;
        }

        .coach-profile-info {
            flex: 1;
            min-width: 200px;
        }

        .coach-profile-info h2 {
            margin-bottom: 4px;
        }

        /* Session card */
        .session-card {
            display: flex;
            gap: var(--s-4);
            padding: var(--s-4);
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        .session-card:last-child {
            border-bottom: none;
        }

        .session-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .session-info {
            flex: 1;
            min-width: 0;
        }

        /* Quick actions */
        .quick-action-bar {
            display: flex;
            gap: var(--s-3);
            padding: var(--s-4);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            margin-bottom: var(--s-6);
            flex-wrap: wrap;
        }

        .role-badge-big {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: var(--r-full);
            font-size: 0.82rem;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            .coach-profile-hero {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div id="navbar"></div>
        <section class="main-content">
            <div class="container" id="dashContent"></div>
        </section>
        <div id="footer"></div>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal" style="max-width:520px;">
            <div id="editModalContent"></div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/roles.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        initPage('coach-dashboard');

        // ---- Access Control ----
        if (!Auth.requireRole('coach')) {
            // Redirected by Auth.requireRole
        } else {
            initDashboard();
        }

        function initDashboard() {
            const user = Auth.getCurrentUser();
            const coach = getCoachByUserId(user.id);
            let activeTab = 'academies';

            function render() {
                const myAcademies = AcademiesStore.filter(a => a.coachUserId === user.id);
                // Collect all enrollments for coach's academies
                const allAcademyIds = myAcademies.map(a => a.id);
                const allEnrollments = AcademyEnrollmentsStore.filter(e => allAcademyIds.includes(e.academyId));
                const pendingRequests = allEnrollments.filter(e => e.status === 'pending');
                const activeStudents = allEnrollments.filter(e => e.status === 'active');

                document.getElementById('dashContent').innerHTML = `
                    <div class="dash-header animate-in">
                        <div>
                            <div class="header-badge-premium">🧑‍🏫 ACADEMY COMMAND CENTER</div>
                            <h1 class="header-title-premium">Coach Dashboard</h1>
                            <p class="text-faint">Manage your elite academies, enrollments, and communications.</p>
                        </div>
                        <div class="flex-gap-2">
                             <a href="academy-create.html" class="btn btn-primary btn-sm">+ Launch New Academy</a>
                             <a href="profile.html" class="btn btn-ghost btn-sm">👤 My Profile</a>
                        </div>
                    </div>

                    <div class="grid grid-4 gap-4 mb-8">
                        <div class="card bg-elevated border-soft animate-in">
                            <div class="text-xs text-faint uppercase font-bold mb-1">Active Academies</div>
                            <div class="text-2xl font-black gradient-text">${myAcademies.length}</div>
                        </div>
                        <div class="card bg-elevated border-soft animate-in animate-delay-1">
                            <div class="text-xs text-faint uppercase font-bold mb-1">Total Students</div>
                            <div class="text-2xl font-black" style="color:var(--primary);">${activeStudents.length}</div>
                        </div>
                        <div class="card bg-elevated border-soft animate-in animate-delay-2">
                            <div class="text-xs text-faint uppercase font-bold mb-1">Pending Requests</div>
                            <div class="text-2xl font-black ${pendingRequests.length > 0 ? 'text-warning' : ''}" style="color:${pendingRequests.length > 0 ? 'var(--warning)' : 'var(--text-faint)'};">${pendingRequests.length}</div>
                        </div>
                        <div class="card bg-elevated border-soft animate-in animate-delay-3">
                            <div class="text-xs text-faint uppercase font-bold mb-1">Active Subscriptions</div>
                            <div class="text-2xl font-black" style="color:var(--accent);">${activeStudents.length}</div>
                        </div>
                    </div>

                    <div class="dash-tabs animate-in">
                        <button class="dash-tab ${activeTab === 'academies' ? 'active' : ''}" onclick="switchTab('academies')">🎓 Managed Academies</button>
                        <button class="dash-tab ${activeTab === 'requests' ? 'active' : ''}" onclick="switchTab('requests')">📩 Enrollment Requests ${pendingRequests.length > 0 ? `<span class="badge badge-warning ml-2">${pendingRequests.length}</span>` : ''}</button>
                        <button class="dash-tab ${activeTab === 'chat' ? 'active' : ''}" onclick="switchTab('chat')">💬 Academy Messenger</button>
                    </div>

                    <!-- Managed Academies -->
                    <div class="tab-content ${activeTab === 'academies' ? 'active' : ''}" id="tab-academies">
                        <div class="grid grid-2 gap-6">
                            ${myAcademies.length === 0
                        ? '<div class="card full-width text-center p-12"><p class="text-faint">You haven\'t created any academies yet.</p><a href="academy-create.html" class="btn btn-primary mt-4">Create Your First Academy</a></div>'
                        : myAcademies.map(a => {
                            const enCount = activeStudents.filter(e => e.academyId === a.id).length;
                            return `
                                        <div class="card bg-elevated border-soft flex-col">
                                            <div class="flex-between mb-4">
                                                <div>
                                                    <h3 class="font-bold text-lg">${a.name}</h3>
                                                    <span class="text-xs text-faint">${a.category} · ${a.location}</span>
                                                </div>
                                                <span class="badge ${a.status === 'active' ? 'badge-accent' : 'badge-warning'}">${a.status.toUpperCase()}</span>
                                            </div>
                                            <div class="grid grid-3 gap-2 mb-6">
                                                <div class="text-center p-2 bg-darker rounded">
                                                    <div class="text-xs text-faint">Students</div>
                                                    <div class="font-bold">${enCount}</div>
                                                </div>
                                                <div class="text-center p-2 bg-darker rounded">
                                                    <div class="text-xs text-faint">Capacity</div>
                                                    <div class="font-bold">${a.maxCapacity}</div>
                                                </div>
                                                <div class="text-center p-2 bg-darker rounded">
                                                    <div class="text-xs text-faint">Rating</div>
                                                    <div class="font-bold" style="color:var(--warning);">⭐ ${a.rating}</div>
                                                </div>
                                            </div>
                                            <div class="flex-gap-2 mt-auto">
                                                <a href="academy-dashboard.html?academy=${a.id}" class="btn btn-primary btn-sm flex-1">View Academy</a>
                                                <button class="btn btn-outline btn-sm" onclick="editAcademy('${a.id}')">Edit</button>
                                            </div>
                                        </div>
                                    `;
                        }).join('')
                    }
                        </div>
                    </div>

                    <!-- Enrollment Requests -->
                    <div class="tab-content ${activeTab === 'requests' ? 'active' : ''}" id="tab-requests">
                        <div class="card">
                            <h3 class="mb-4">Pending Enrollment Requests</h3>
                            ${pendingRequests.length === 0
                        ? '<p class="text-faint text-center p-8">No pending requests at the moment.</p>'
                        : `
                                <div class="table-wrapper">
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>Player Name</th>
                                                <th>Academy</th>
                                                <th>Request Date</th>
                                                <th>Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${pendingRequests.map(r => {
                            const acad = AcademiesStore.getById(r.academyId);
                            return `
                                                    <tr>
                                                        <td class="font-bold">${r.playerName}</td>
                                                        <td>${acad ? acad.name : 'Unknown Academy'}</td>
                                                        <td>${formatDate(r.enrolledAt)}</td>
                                                        <td>
                                                            <div class="flex-gap-2">
                                                                <button class="btn btn-accent btn-xs" onclick="updateRequest('${r.id}', 'approved')">Accept</button>
                                                                <button class="btn btn-error btn-xs" onclick="updateRequest('${r.id}', 'rejected')">Reject</button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                `;
                        }).join('')}
                                        </tbody>
                                    </table>
                                </div>
                                `
                    }
                        </div>
                    </div>

                    <!-- Academy Messenger -->
                    <div class="tab-content ${activeTab === 'chat' ? 'active' : ''}" id="tab-chat">
                        <div class="card p-0 overflow-hidden hb-messenger">
                            <div class="messenger-grid">
                                <div class="messenger-sidebar bg-elevated border-right">
                                    <div class="p-4 border-bottom font-bold text-sm tracking-wider uppercase opacity-50">Academies</div>
                                    ${myAcademies.map(a => `
                                        <div class="messenger-item p-4 border-bottom cursor-pointer hover-bg" onclick="selectChatAcademy('${a.id}')" id="chat-item-${a.id}">
                                            <div class="font-bold text-sm">${a.name}</div>
                                            <div class="text-xs text-faint">Group Chat</div>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="messenger-body flex-col">
                                    <div id="messengerHeader" class="p-4 border-bottom flex-between bg-elevated">
                                        <div class="font-bold">Select an academy to start chatting</div>
                                    </div>
                                    <div id="messengerHistory" class="messenger-history p-4 flex-1">
                                        <div class="text-center mt-20 text-faint">Select a conversation from the left to view messages.</div>
                                    </div>
                                    <form id="messengerForm" class="p-4 bg-elevated border-top flex-gap-2" style="display:none;" onsubmit="sendMessengerMessage(event)">
                                        <input type="hidden" id="activeChatId">
                                        <input type="text" class="form-input text-sm flex-1" id="messengerInput" placeholder="Type a message to the group...">
                                        <button type="submit" class="btn btn-primary btn-sm px-6">Send</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            render();

            window.switchTab = (tab) => {
                activeTab = tab;
                render();
            };

            window.updateRequest = (id, status) => {
                const req = AcademyEnrollmentsStore.getById(id);
                if (!req) return;
                const academy = AcademiesStore.getById(req.academyId);
                if (!academy || academy.coachUserId !== user.id) {
                    showToast('Access denied: You do not own this academy.', 'error');
                    return;
                }

                AcademyEnrollmentsStore.update(id, {
                    status: status,
                    subscriptionEnd: status === 'approved' ? new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0] : null
                });
                showToast(`Request ${status === 'approved' ? 'accepted' : 'rejected'}`, 'success');
                render();
            };

            let selectedAcademyId = null;
            window.selectChatAcademy = (id) => {
                selectedAcademyId = id;
                const acad = AcademiesStore.getById(id);
                document.getElementById('activeChatId').value = id;
                document.getElementById('messengerHeader').innerHTML = `
                    <div>
                        <div class="font-bold">${acad.name}</div>
                        <div class="text-xs text-primary">Group Chat (${AcademyEnrollmentsStore.filter(e => e.academyId === id && (e.status === 'active' || e.status === 'approved')).length} Members)</div>
                    </div>
                `;
                document.getElementById('messengerForm').style.display = 'flex';
                loadChatHistory();

                document.querySelectorAll('.messenger-item').forEach(i => i.classList.remove('active-chat'));
                document.getElementById('chat-item-' + id).classList.add('active-chat');
            };

            function loadChatHistory() {
                if (!selectedAcademyId) return;
                const msgs = AcademyMessagesStore.filter(m => m.toId === selectedAcademyId || m.fromId === selectedAcademyId);
                const history = document.getElementById('messengerHistory');
                history.innerHTML = msgs.length === 0
                    ? '<div class="text-center mt-10 text-faint">No messages yet. Start the conversation!</div>'
                    : msgs.map(m => {
                        const isMe = m.fromId === user.id;
                        return `
                            <div class="chat-bubble-wrap ${isMe ? 'chat-me' : 'chat-them'}">
                                ${!isMe ? `<div class="chat-sender-name">${m.senderName || 'Student'}</div>` : ''}
                                <div class="chat-bubble">${m.text}</div>
                                <div class="chat-time">${formatTimeAgo(m.timestamp)}</div>
                            </div>
                        `;
                    }).join('');
                history.scrollTop = history.scrollHeight;
            }

            window.sendMessengerMessage = (e) => {
                e.preventDefault();
                const input = document.getElementById('messengerInput');
                const text = input.value.trim();
                const academyId = document.getElementById('activeChatId').value;
                if (!text || !academyId) return;

                AcademyMessagesStore.add({
                    fromId: user.id,
                    toId: academyId,
                    senderName: user.name,
                    text: text,
                    timestamp: new Date().toISOString()
                });

                input.value = '';
                loadChatHistory();
            };

            // Dynamic polling for chat
            setInterval(() => {
                if (activeTab === 'chat' && selectedAcademyId) loadChatHistory();
            }, 5000);
        }

        // Click outside modal helper
        window.closeEditModal = function () {
            document.getElementById('editModal').classList.remove('active');
        };
    </script>
</body>

</html>
