<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="SPORTIFY Social Feed — Share goals, training highlights, academy achievements, and tournament moments.">
    <title>Social Feed — SPORTIFY</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .feed-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: var(--s-6);
            align-items: start;
        }

        .feed-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-xl);
            overflow: hidden;
            margin-bottom: var(--s-6);
            transition: all var(--t-base);
        }

        .feed-card:hover {
            border-color: var(--border-glow);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .feed-card-header {
            display: flex;
            gap: var(--s-3);
            align-items: center;
            padding: var(--s-5) var(--s-6);
        }

        .feed-avatar {
            width: 42px;
            height: 42px;
            border-radius: var(--r-full);
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--bg-body);
            flex-shrink: 0;
            border: 2px solid transparent;
            transition: all var(--t-fast);
        }

        .feed-card:hover .feed-avatar {
            border-color: var(--primary);
            box-shadow: var(--primary-glow);
        }

        .feed-card-media {
            width: 100%;
            height: 340px;
            background: linear-gradient(135deg, var(--bg-elevated), var(--bg-surface));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            font-size: 4.5rem;
        }

        .feed-card-media::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 60%, rgba(0, 0, 0, 0.3));
            pointer-events: none;
        }

        .feed-card-body {
            padding: var(--s-5) var(--s-6);
        }

        .feed-card-body h3 {
            font-family: var(--font-display);
        }

        .feed-card-actions {
            display: flex;
            gap: var(--s-2);
            padding: var(--s-3) var(--s-6);
            border-top: 1px solid var(--border);
            align-items: center;
        }

        .feed-action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: 1px solid transparent;
            color: var(--text-faint);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: var(--r-full);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: var(--font-display);
            position: relative;
            -webkit-user-select: none;
            user-select: none;
        }

        .feed-action-btn:hover {
            color: var(--text-h);
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1.05);
        }

        .feed-action-btn:active {
            transform: scale(0.95);
        }

        /* ---- Reaction: LIKE active ---- */
        .feed-action-btn.reaction-like-active {
            color: var(--primary);
            background: var(--primary-subtle);
            border-color: var(--primary-border);
            box-shadow: 0 0 12px rgba(0, 230, 118, 0.15);
        }

        .feed-action-btn.reaction-like-active:hover {
            background: var(--primary-subtle-strong);
            box-shadow: 0 0 18px rgba(0, 230, 118, 0.25);
        }

        /* ---- Reaction: DISLIKE active ---- */
        .feed-action-btn.reaction-dislike-active {
            color: var(--danger);
            background: var(--danger-subtle);
            border-color: rgba(255, 82, 82, 0.3);
            box-shadow: 0 0 12px rgba(255, 82, 82, 0.12);
        }

        .feed-action-btn.reaction-dislike-active:hover {
            background: rgba(255, 82, 82, 0.15);
            box-shadow: 0 0 18px rgba(255, 82, 82, 0.2);
        }

        /* ---- Reaction: Loading state ---- */
        .feed-action-btn.reaction-loading {
            opacity: 0.6;
            pointer-events: none;
            cursor: wait;
        }

        .feed-action-btn.reaction-loading .reaction-icon {
            animation: reactionPulse 0.6s ease infinite;
        }

        @keyframes reactionPulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
            }
        }

        /* ---- Reaction: Pop animation on toggle ---- */
        @keyframes reactionPop {
            0% {
                transform: scale(1);
            }

            30% {
                transform: scale(1.35);
            }

            60% {
                transform: scale(0.9);
            }

            100% {
                transform: scale(1);
            }
        }

        .reaction-pop .reaction-icon {
            animation: reactionPop 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .reaction-count {
            font-variant-numeric: tabular-nums;
            min-width: 12px;
            text-align: center;
            transition: all 0.2s ease;
        }

        .reaction-separator {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 var(--s-1);
        }

        /* Legacy compat class */
        .feed-action-btn.liked {
            color: var(--primary);
            background: var(--primary-subtle);
        }

        .feed-comments {
            padding: 0 var(--s-6) var(--s-4);
        }

        .feed-comment {
            display: flex;
            gap: var(--s-2);
            padding: var(--s-2) 0;
            font-size: 0.85rem;
        }

        .feed-comment-name {
            font-weight: 700;
            color: var(--text-h);
            font-family: var(--font-display);
        }

        .feed-comment-input {
            display: flex;
            gap: var(--s-2);
            padding: var(--s-3) var(--s-6) var(--s-5);
            border-top: 1px solid var(--border);
        }

        .feed-comment-input input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-strong);
            border-radius: var(--r-full);
            padding: 10px 18px;
            color: var(--text-h);
            font-size: 0.85rem;
            outline: none;
            font-family: inherit;
            transition: all var(--t-fast);
        }

        .feed-comment-input input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-subtle), var(--primary-glow);
        }

        .feed-type-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: var(--r-full);
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .type-goal_video {
            background: var(--accent-subtle);
            color: var(--accent);
        }

        .type-training_highlight {
            background: var(--info-subtle);
            color: var(--info);
        }

        .type-academy_achievement {
            background: var(--primary-subtle-strong);
            color: var(--primary);
        }

        .type-tournament_moment {
            background: var(--warning-subtle);
            color: var(--warning);
        }

        .filter-pills {
            display: flex;
            gap: var(--s-2);
            flex-wrap: wrap;
            margin-bottom: var(--s-6);
        }

        .filter-pill {
            padding: 8px 18px;
            border-radius: var(--r-full);
            border: 1px solid var(--border-strong);
            background: var(--bg-surface);
            color: var(--text-faint);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--t-fast);
            font-family: var(--font-display);
        }

        .filter-pill:hover {
            border-color: var(--primary-border);
            color: var(--text-p);
            transform: translateY(-1px);
        }

        .filter-pill.active {
            background: var(--primary-subtle-strong);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: var(--primary-glow);
        }

        .feed-sidebar .card {
            margin-bottom: var(--s-4);
        }

        .trending-item {
            display: flex;
            gap: var(--s-3);
            padding: var(--s-3) var(--s-2);
            border-bottom: 1px solid var(--border);
            align-items: center;
            border-radius: var(--r-md);
            transition: all var(--t-fast);
        }

        .trending-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .trending-item:last-child {
            border-bottom: none;
        }

        .trending-rank {
            font-family: var(--font-display);
            font-weight: 900;
            color: var(--primary);
            font-size: 1.15rem;
            width: 28px;
            text-align: center;
        }

        .create-post-card {
            padding: var(--s-6);
            margin-bottom: var(--s-6);
            border: 1px solid var(--primary-border);
            background: linear-gradient(135deg, var(--bg-card), rgba(0, 230, 118, 0.02));
        }

        @media (max-width: 960px) {
            .feed-layout {
                grid-template-columns: 1fr;
            }

            .feed-sidebar {
                order: -1;
            }

            .feed-card-media {
                height: 240px;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div id="navbar"></div>
        <section class="main-content">
            <div class="container">
                <div class="section-header section-header-premium animate-in">
                    <div class="header-badge-premium">📱 COMMUNITY</div>
                    <h1 class="header-title-premium">Sports Social Feed</h1>
                    <p>Goals, training highlights, academy achievements &amp; tournament moments</p>
                    <div class="header-divider-premium" style="width: 100px;"></div>
                </div>

                <div class="filter-pills animate-in" id="filterPills">
                    <button class="filter-pill active" onclick="setFilter('trending')">🔥 Trending</button>
                    <button class="filter-pill" onclick="setFilter('popular')">⭐ Popular</button>
                    <button class="filter-pill" onclick="setFilter('academy')">🎓 Academy</button>
                    <button class="filter-pill" onclick="setFilter('nearby')">📍 Nearby</button>
                </div>

                <div class="feed-layout">
                    <div id="feedContent"></div>
                    <div class="feed-sidebar" id="feedSidebar"></div>
                </div>
            </div>
        </section>
        <div id="footer"></div>
    </div>

    <script src="js/sports-config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/roles.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/subscription.js"></script>
    <script src="js/race-guard.js"></script>
    <script src="js/feed.js"></script>
    <script src="js/app.js"></script>
    <script>
        initPage('feed');

        const user = Auth.getCurrentUser();
        const isLogged = Auth.isLoggedIn();
        let currentFilter = 'trending';

        const TYPE_LABELS = {
            goal_video: '⚽ Goal',
            training_highlight: '🏃 Training',
            academy_achievement: '🎓 Academy',
            tournament_moment: '🏆 Tournament'
        };

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            renderFeed();
        }

        function renderFeed() {
            const posts = FeedInteractions.getByFilter(currentFilter);

            let html = '';

            // Create post card (logged in only)
            if (isLogged) {
                html += `
                <div class="card create-post-card animate-in">
                    <div style="display:flex;gap:var(--s-3);align-items:center;">
                        <div class="feed-avatar">${user.name.charAt(0).toUpperCase()}</div>
                        <input type="text" class="form-input" id="newPostTitle" placeholder="Share a sports moment..." style="flex:1;border-radius:var(--r-full);">
                    </div>
                    <div id="createPostExpanded" style="display:none;margin-top:var(--s-4);">
                        <textarea class="form-textarea" id="newPostDesc" rows="2" placeholder="Add description..." style="margin-bottom:var(--s-3);"></textarea>
                        <div class="form-row" style="margin-bottom:var(--s-3);">
                            <select class="form-select" id="newPostType">
                                <option value="goal_video">⚽ Goal Video</option>
                                <option value="training_highlight">🏃 Training Highlight</option>
                                <option value="academy_achievement">🎓 Academy Achievement</option>
                                <option value="tournament_moment">🏆 Tournament Moment</option>
                            </select>
                            <input type="text" class="form-input" id="newPostLocation" placeholder="Location (e.g., Nasr City)">
                        </div>
                        <div style="display:flex;justify-content:flex-end;gap:var(--s-2);">
                            <button class="btn btn-ghost btn-sm" onclick="collapseCreate()">Cancel</button>
                            <button class="btn btn-primary btn-sm" onclick="createPost()">Post 🚀</button>
                        </div>
                    </div>
                </div>`;
            }

            if (posts.length === 0) {
                html += '<div class="card text-center" style="padding:var(--s-16);"><p class="text-faint">No posts yet. Be the first to share! 📱</p></div>';
            }

            posts.forEach((post, i) => {
                const author = getUserById(post.userId);
                const authorName = author ? author.name : 'Unknown';
                const isLiked = isLogged ? FeedInteractions.hasLiked(post.id, user.id) : false;
                const isDisliked = isLogged ? FeedInteractions.hasDisliked(post.id, user.id) : false;
                const comments = FeedInteractions.getComments(post.id).slice(0, 3);
                const likeCount = post.likes || 0;
                const dislikeCount = post.dislikes || 0;

                html += `
                <div class="feed-card animate-in" style="animation-delay:${i * 0.06}s;">
                    <div class="feed-card-header">
                        <div class="feed-avatar" style="background:${post.type === 'academy_achievement' ? 'var(--primary)' : post.type === 'goal_video' ? 'var(--accent)' : 'var(--info)'}">
                            ${authorName.charAt(0).toUpperCase()}
                        </div>
                        <div style="flex:1;min-width:0;">
                            <div style="font-weight:700;color:var(--text-h);font-size:0.9rem;">${authorName}</div>
                            <div class="text-xs text-faint">${formatTimeAgo(post.createdAt)}${post.location ? ' · 📍 ' + post.location : ''}</div>
                        </div>
                        <span class="feed-type-badge type-${post.type}">${TYPE_LABELS[post.type] || post.type}</span>
                    </div>

                    <div class="feed-card-media">
                        ${TYPE_LABELS[post.type] ? TYPE_LABELS[post.type].split(' ')[0] : '📱'}
                    </div>

                    <div class="feed-card-body">
                        <h3 style="font-size:1rem;margin-bottom:4px;">${post.title}</h3>
                        <p class="text-sm text-faint">${post.description}</p>
                        ${post.tags && post.tags.length > 0 ? `<div style="margin-top:var(--s-2);">${post.tags.map(t => `<span class="badge badge-neutral" style="margin-right:4px;">#${t}</span>`).join('')}</div>` : ''}
                    </div>

                    <div class="feed-card-actions">
                        <button class="feed-action-btn ${isLiked ? 'reaction-like-active' : ''}" 
                                onclick="handleReaction('${post.id}', 'LIKE')" 
                                id="like-btn-${post.id}"
                                title="Like this post">
                            <span class="reaction-icon">${isLiked ? '👍' : '👍🏼'}</span>
                            <span class="reaction-count" id="like-count-${post.id}">${likeCount}</span>
                        </button>
                        <button class="feed-action-btn ${isDisliked ? 'reaction-dislike-active' : ''}" 
                                onclick="handleReaction('${post.id}', 'DISLIKE')" 
                                id="dislike-btn-${post.id}"
                                title="Dislike this post">
                            <span class="reaction-icon">${isDisliked ? '👎' : '👎🏼'}</span>
                            <span class="reaction-count" id="dislike-count-${post.id}">${dislikeCount}</span>
                        </button>
                        <div class="reaction-separator"></div>
                        <button class="feed-action-btn" onclick="toggleComments('${post.id}')">
                            💬 ${post.commentsCount || 0}
                        </button>
                        <button class="feed-action-btn" style="margin-left:auto;" onclick="sharePost('${post.id}')">
                            🔗 Share
                        </button>
                    </div>

                    <div class="feed-comments" id="comments-${post.id}" style="display:none;">
                        ${comments.map(c => `
                            <div class="feed-comment">
                                <span class="feed-comment-name">${c.userName}</span>
                                <span>${c.text}</span>
                            </div>
                        `).join('')}
                        ${comments.length === 0 ? '<p class="text-xs text-faint" style="padding:var(--s-2) 0;">No comments yet</p>' : ''}
                    </div>

                    ${isLogged ? `
                    <div class="feed-comment-input" id="comment-input-${post.id}" style="display:none;">
                        <input type="text" placeholder="Add a comment..." id="comment-text-${post.id}" onkeypress="if(event.key==='Enter') addComment('${post.id}')">
                        <button class="btn btn-primary btn-sm" onclick="addComment('${post.id}')">Post</button>
                    </div>` : ''}
                </div>`;
            });

            document.getElementById('feedContent').innerHTML = html;

            // Attach expand listener
            const titleInput = document.getElementById('newPostTitle');
            if (titleInput) {
                titleInput.addEventListener('focus', () => {
                    document.getElementById('createPostExpanded').style.display = 'block';
                });
            }
        }

        function renderSidebar() {
            const trending = FeedInteractions.getTrending().slice(0, 5);

            document.getElementById('feedSidebar').innerHTML = `
                <div class="card animate-in">
                    <h4 style="margin-bottom:var(--s-4);">🔥 Trending</h4>
                    ${trending.map((p, i) => {
                const author = getUserById(p.userId);
                return `
                        <div class="trending-item">
                            <div class="trending-rank">${i + 1}</div>
                            <div style="flex:1;min-width:0;">
                                <div style="font-weight:600;color:var(--text-h);font-size:0.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.title}</div>
                                <div class="text-xs text-faint">${author ? author.name : ''} · 👍 ${p.likes || 0}${p.dislikes ? ' · 👎 ' + p.dislikes : ''}</div>
                            </div>
                        </div>`;
            }).join('')}
                    ${trending.length === 0 ? '<p class="text-xs text-faint">No trending posts yet</p>' : ''}
                </div>

                <div class="card animate-in animate-delay-1">
                    <h4 style="margin-bottom:var(--s-4);">📊 Feed Stats</h4>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--s-3);">
                        <div class="stat-card" style="padding:var(--s-3);text-align:center;">
                            <div class="stat-value" style="font-size:1.3rem;">${FeedPostsStore.count()}</div>
                            <div class="stat-label">Posts</div>
                        </div>
                        <div class="stat-card" style="padding:var(--s-3);text-align:center;">
                            <div class="stat-value" style="font-size:1.3rem;">${FeedCommentsStore.count()}</div>
                            <div class="stat-label">Comments</div>
                        </div>
                    </div>
                </div>

                ${!isLogged ? `
                <div class="card animate-in animate-delay-2" style="text-align:center;">
                    <p class="text-sm text-faint" style="margin-bottom:var(--s-3);">Log in to like, comment & post</p>
                    <a href="login.html" class="btn btn-primary btn-sm btn-block">Log In</a>
                </div>` : ''}
            `;
        }

        /**
         * Handle a like or dislike reaction.
         * Manages loading state, button disable, pop animation, and count sync.
         */
        function handleReaction(postId, type) {
            if (!isLogged) { showToast('Log in to react to posts', 'error'); return; }

            const likeBtn = document.getElementById('like-btn-' + postId);
            const dislikeBtn = document.getElementById('dislike-btn-' + postId);
            const activeBtn = type === 'LIKE' ? likeBtn : dislikeBtn;

            // Show loading state
            if (activeBtn) {
                activeBtn.classList.add('reaction-loading');
            }

            // Small delay to show loading (simulates async, prevents double-click visually)
            setTimeout(() => {
                const result = FeedInteractions.toggleReaction(postId, user.id, type);

                // Remove loading
                if (activeBtn) activeBtn.classList.remove('reaction-loading');

                if (result === null) {
                    showToast('Please wait...', 'warning');
                    return;
                }

                // Update LIKE button state
                if (likeBtn) {
                    likeBtn.classList.toggle('reaction-like-active', result.reaction === 'LIKE');
                    likeBtn.innerHTML = `<span class="reaction-icon">${result.reaction === 'LIKE' ? '👍' : '👍🏼'}</span><span class="reaction-count" id="like-count-${postId}">${result.likes}</span>`;

                    // Pop animation on activation
                    if (result.reaction === 'LIKE') {
                        likeBtn.classList.add('reaction-pop');
                        setTimeout(() => likeBtn.classList.remove('reaction-pop'), 400);
                    }
                }

                // Update DISLIKE button state
                if (dislikeBtn) {
                    dislikeBtn.classList.toggle('reaction-dislike-active', result.reaction === 'DISLIKE');
                    dislikeBtn.innerHTML = `<span class="reaction-icon">${result.reaction === 'DISLIKE' ? '👎' : '👎🏼'}</span><span class="reaction-count" id="dislike-count-${postId}">${result.dislikes}</span>`;

                    // Pop animation on activation
                    if (result.reaction === 'DISLIKE') {
                        dislikeBtn.classList.add('reaction-pop');
                        setTimeout(() => dislikeBtn.classList.remove('reaction-pop'), 400);
                    }
                }
            }, 80); // 80ms simulated delay for UX feedback
        }

        // Legacy compat — if anything still calls toggleLike
        function toggleLike(postId) {
            handleReaction(postId, 'LIKE');
        }

        function toggleComments(postId) {
            const el = document.getElementById('comments-' + postId);
            const inputEl = document.getElementById('comment-input-' + postId);
            if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
            if (inputEl) inputEl.style.display = el.style.display;
        }

        function addComment(postId) {
            if (!isLogged) return;
            const input = document.getElementById('comment-text-' + postId);
            if (!input || !input.value.trim()) return;

            FeedInteractions.addComment(postId, user.id, user.name, input.value);
            input.value = '';
            showToast('Comment added! 💬', 'success');
            renderFeed();
        }

        function createPost() {
            if (!isLogged) return;
            const title = document.getElementById('newPostTitle').value.trim();
            const desc = document.getElementById('newPostDesc').value.trim();
            const type = document.getElementById('newPostType').value;
            const location = document.getElementById('newPostLocation').value.trim();

            if (!title) { showToast('Please add a title', 'error'); return; }

            FeedInteractions.createPost(user.id, { title, description: desc, type, location });
            showToast('Post shared! 🚀', 'success');
            collapseCreate();
            renderFeed();
            renderSidebar();
        }

        function collapseCreate() {
            document.getElementById('createPostExpanded').style.display = 'none';
            document.getElementById('newPostTitle').value = '';
        }

        function sharePost(postId) {
            showToast('Link copied! 🔗', 'success');
        }

        renderFeed();
        renderSidebar();
    </script>
</body>

</html>
