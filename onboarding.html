<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Choose your preferred sport on SPORTIFY — personalize your experience.">
    <title>Choose Your Sport — SPORTIFY</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .onboarding-root {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .onboarding-container {
            max-width: 540px;
            width: 100%;
            text-align: center;
        }

        .onboarding-logo {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 900;
            font-style: italic;
            color: var(--text-h);
            text-transform: uppercase;
            margin-bottom: 40px;
            display: block;
        }

        .onboarding-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 900;
            color: var(--text-h);
            margin-bottom: 8px;
        }

        .onboarding-sub {
            color: var(--text-faint);
            font-size: 1rem;
            margin-bottom: 40px;
        }

        .sport-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .sport-card {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: var(--r-xl);
            padding: 28px 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .sport-card:hover {
            border-color: rgba(0, 234, 255, 0.4);
            transform: translateY(-4px);
            box-shadow: 0 0 20px rgba(0, 234, 255, 0.15);
        }

        .sport-card.selected {
            border-color: #00eaff;
            background: rgba(0, 234, 255, 0.08);
            box-shadow: 0 0 25px rgba(0, 234, 255, 0.25), 0 0 50px rgba(0, 234, 255, 0.08);
            transform: translateY(-4px) scale(1.02);
        }

        .sport-card-icon {
            font-size: 3rem;
            line-height: 1;
            transition: transform 0.3s ease;
        }

        .sport-card:hover .sport-card-icon,
        .sport-card.selected .sport-card-icon {
            transform: scale(1.15);
        }

        .sport-card-name {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-p);
            transition: color 0.3s ease;
        }

        .sport-card.selected .sport-card-name {
            color: #00eaff;
        }

        .sport-card-check {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .sport-card.selected .sport-card-check {
            border-color: #00eaff;
            background: #00eaff;
            color: #0A0F19;
        }

        .onboarding-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(90deg, #00ff9c, #00eaff);
            color: #0A0F19;
            box-shadow: 0 0 20px rgba(0, 255, 156, 0.3);
        }

        .onboarding-btn:hover:not(:disabled) {
            box-shadow: 0 0 30px rgba(0, 255, 156, 0.5), 0 0 60px rgba(0, 234, 255, 0.2);
            transform: translateY(-2px);
        }

        .onboarding-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .onboarding-skip {
            display: block;
            margin-top: 16px;
            color: var(--text-faint);
            font-size: 0.85rem;
            cursor: pointer;
            transition: color 0.2s ease;
            text-decoration: none;
            background: none;
            border: none;
        }

        .onboarding-skip:hover {
            color: #00eaff;
        }

        @media (max-width: 480px) {
            .sport-cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="onboarding-root">
        <div class="onboarding-container">
            <a href="index.html" class="onboarding-logo">⚽ SPORTIFY</a>

            <h1 class="onboarding-title">Choose Your Sport</h1>
            <p class="onboarding-sub">Pick your main sport to personalize your SPORTIFY experience.</p>

            <div class="sport-cards" id="sportCards">
                <div class="sport-card" data-sport="football" onclick="selectSport(this)">
                    <div class="sport-card-icon">⚽</div>
                    <div class="sport-card-name">Football</div>
                    <div class="sport-card-check">✓</div>
                </div>
                <div class="sport-card" data-sport="padel" onclick="selectSport(this)">
                    <div class="sport-card-icon">🎾</div>
                    <div class="sport-card-name">Padel</div>
                    <div class="sport-card-check">✓</div>
                </div>
                <div class="sport-card" data-sport="basketball" onclick="selectSport(this)">
                    <div class="sport-card-icon">🏀</div>
                    <div class="sport-card-name">Basketball</div>
                    <div class="sport-card-check">✓</div>
                </div>
            </div>

            <button class="onboarding-btn" id="continueBtn" disabled onclick="handleContinue()">
                Continue →
            </button>

            <button class="onboarding-skip" onclick="handleSkip()">
                Skip for now
            </button>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/roles.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Guard: must be logged in
        if (!Auth.isLoggedIn()) {
            window.location.href = 'login.html';
        }

        // If user already has a sport, skip onboarding
        if (!Auth.needsOnboarding()) {
            window.location.href = 'profile.html';
        }

        let selectedSport = '';

        function selectSport(el) {
            // Remove previous selection
            document.querySelectorAll('.sport-card').forEach(c => c.classList.remove('selected'));

            // Select this card
            el.classList.add('selected');
            selectedSport = el.dataset.sport;

            // Enable continue button
            document.getElementById('continueBtn').disabled = false;
        }

        function handleContinue() {
            if (!selectedSport) return;

            // Save preferred sport
            Auth.updateSession({ preferredSport: selectedSport });

            // Redirect to home
            window.location.href = 'index.html';
        }

        function handleSkip() {
            // Default to football and proceed
            Auth.updateSession({ preferredSport: 'football' });
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
