<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="SPORTIFY Smart Matchmaking — Find teammates, join matches, and play football with players near you.">
    <title>Find Players — SPORTIFY</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .match-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: var(--s-6);
            align-items: start;
        }

        .match-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: var(--s-6);
            margin-bottom: var(--s-5);
            transition: all var(--t-base);
            position: relative;
            overflow: hidden;
        }

        .match-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            opacity: 0;
            transition: opacity var(--t-base);
        }

        .match-card:hover {
            border-color: var(--border-glow);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .match-card:hover::before {
            opacity: 1;
        }

        .match-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--s-3);
        }

        .match-card-header div:first-child div:first-child {
            font-family: var(--font-display);
        }

        .players-bar {
            display: flex;
            margin-top: var(--s-3);
            margin-bottom: var(--s-2);
        }

        .player-dot {
            width: 32px;
            height: 32px;
            border-radius: var(--r-full);
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            color: var(--bg-body);
            font-weight: 700;
            border: 2px solid var(--bg-card);
            margin-left: -6px;
            transition: transform var(--t-fast);
        }

        .player-dot:first-child {
            margin-left: 0;
        }

        .player-dot:hover {
            transform: scale(1.15);
            z-index: 2;
        }

        .player-dot.empty {
            background: var(--bg-elevated);
            border: 2px dashed var(--border-strong);
            color: var(--text-faint);
        }

        .progress-bar-wrap {
            height: 5px;
            background: var(--bg-elevated);
            border-radius: var(--r-full);
            overflow: hidden;
            margin-top: var(--s-2);
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: var(--r-full);
            transition: width 0.6s var(--ease);
        }

        .skill-beginner {
            background: var(--primary-subtle-strong);
            color: var(--primary);
        }

        .skill-intermediate {
            background: var(--info-subtle);
            color: var(--info);
        }

        .skill-advanced {
            background: var(--warning-subtle);
            color: var(--warning);
        }

        .filter-pills {
            display: flex;
            gap: var(--s-2);
            flex-wrap: wrap;
            margin-bottom: var(--s-6);
        }

        .filter-pill {
            padding: 8px 18px;
            border-radius: var(--r-full);
            border: 1px solid var(--border-strong);
            background: var(--bg-surface);
            color: var(--text-faint);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--t-fast);
            font-family: var(--font-display);
        }

        .filter-pill:hover {
            border-color: var(--primary-border);
            color: var(--text-p);
            transform: translateY(-1px);
        }

        .filter-pill.active {
            background: var(--primary-subtle-strong);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: var(--primary-glow);
        }

        .create-match-card {
            position: sticky;
            top: 80px;
            border: 1px solid var(--primary-border);
            background: linear-gradient(135deg, var(--bg-card), rgba(0, 230, 118, 0.02));
        }

        .create-match-card h3 {
            font-family: var(--font-display);
        }

        /* ---- Match Chat (NEW) ---- */
        .match-chat-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 380px;
            height: 100vh;
            background: var(--bg-card);
            border-left: 1px solid var(--border-glow);
            border-radius: 0;
            box-shadow: -5px 0 30px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            z-index: 2000;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .match-chat-panel.active {
            transform: translateX(0);
        }

        .match-chat-header {
            padding: var(--s-4);
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: var(--bg-body);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .match-chat-messages {
            flex: 1;
            padding: var(--s-4);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: var(--s-3);
            background: rgba(0, 0, 0, 0.1);
        }

        .chat-msg {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: var(--r-lg);
            font-size: 0.85rem;
            position: relative;
        }

        .chat-msg.sent {
            align-self: flex-end;
            background: var(--primary);
            color: var(--bg-body);
            border-bottom-right-radius: 2px;
        }

        .chat-msg.received {
            align-self: flex-start;
            background: var(--bg-elevated);
            color: var(--text-p);
            border-bottom-left-radius: 2px;
        }

        .chat-msg-info {
            font-size: 0.65rem;
            opacity: 0.7;
            margin-bottom: 2px;
        }

        .match-chat-input {
            padding: var(--s-3);
            border-top: 1px solid var(--border);
            display: flex;
            gap: var(--s-2);
        }

        .chat-toggle-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: var(--r-full);
            background: var(--primary);
            color: var(--bg-body);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: var(--primary-glow);
            z-index: 999;
            transition: all var(--t-base);
        }

        .chat-toggle-btn:hover {
            transform: scale(1.1);
        }

        .chat-toggle-btn.hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div id="navbar"></div>
        <section class="main-content">
            <div class="container">
                <div class="section-header animate-in">
                    <div class="section-badge">🤝 MATCHMAKING</div>
                    <h1>Find Teammates</h1>
                    <p>Smart matchmaking — find missing players for your match</p>
                </div>

                <div class="filter-pills animate-in" id="filterPills">
                    <button class="filter-pill active" onclick="setFilter('all', this)">All Matches</button>
                    <button class="filter-pill" onclick="setFilter('football', this)">⚽ Football</button>
                    <button class="filter-pill" onclick="setFilter('padel', this)">🎾 Padel</button>
                    <button class="filter-pill" onclick="setFilter('basketball', this)">🏀 Basketball</button>
                </div>

                <div class="match-layout">
                    <div id="matchList"></div>
                    <div id="matchSidebar"></div>
                </div>
            </div>
        </section>
        <div id="footer"></div>
    </div>

    <!-- Match Chat Panel -->
    <div class="match-chat-panel" id="matchChatPanel">
        <div class="match-chat-header">
            <div style="display:flex;align-items:center;gap:var(--s-2);">
                <span id="chatTitle">Match Chat</span>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="toggleChat()"
                style="color:inherit;padding:2px 8px;">✕</button>
        </div>
        <div class="match-chat-messages" id="chatMessages"></div>
        <div class="match-chat-input">
            <input type="text" class="form-input" id="chatInputField" placeholder="Type a message..." style="margin:0;">
            <button class="btn btn-primary btn-sm" onclick="sendChatMessage()">Send</button>
        </div>
    </div>

    <div class="chat-toggle-btn hidden" id="chatToggle" onclick="toggleChat()">💬</div>

    <!-- Match Result Modal -->
    <div class="modal-overlay" id="resultModal">
        <div class="modal" style="max-width:400px; padding: var(--s-6);">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--s-5);">
                <h3 style="margin:0;">⚽ Submit Match Result</h3>
                <button class="btn btn-ghost btn-sm" onclick="closeResultModal()" style="font-size:1.2rem;">✕</button>
            </div>

            <input type="hidden" id="matchIdToSubmit">

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Team A Score</label>
                    <input type="number" class="form-input" id="score1" value="0" min="0" title="Score for Team A">
                </div>
                <div class="form-group">
                    <label class="form-label">Team B Score</label>
                    <input type="number" class="form-input" id="score2" value="0" min="0" title="Score for Team B">
                </div>
            </div>

            <p class="text-xs text-faint mt-4">Other players must confirm the result before stats are updated.</p>

            <button class="btn btn-primary btn-block mt-4" onclick="submitResult()">Submit for Confirmation</button>
        </div>
    </div>

    <script src="js/sports-config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/roles.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/subscription.js"></script>
    <script src="js/race-guard.js"></script>
    <script src="js/matchmaking.js"></script>
    <script src="js/match-chat.js"></script>
    <script src="js/app.js"></script>
    <script>
        initPage('matchmaking');

        const user = Auth.getCurrentUser();
        const isLogged = Auth.isLoggedIn();
        let currentFilter = 'all';

        // Check for sport in URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('sport')) {
            currentFilter = urlParams.get('sport');
            // Update active pill
            window.addEventListener('DOMContentLoaded', () => {
                document.querySelectorAll('.filter-pill').forEach(btn => {
                    if (btn.textContent.toLowerCase().includes(currentFilter)) {
                        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                        btn.classList.add('active');
                    }
                });
                renderMatches();
            });
        }

        function setFilter(filter, el) {
            currentFilter = filter;
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            renderMatches();
        }

        function renderMatches() {
            const filters = {};
            if (currentFilter !== 'all') {
                // If it's one of our sports, filter by sport
                if (['football', 'padel', 'basketball'].includes(currentFilter)) {
                    filters.sport = currentFilter;
                } else {
                    filters.skillLevel = currentFilter;
                }
            }
            const matches = MatchmakingManager.getOpenMatches(filters);

            let html = '';
            if (matches.length === 0) {
                html = `<div class="card text-center" style="padding:var(--s-16);">
                    <div style="font-size:3rem;margin-bottom:var(--s-4);">🤷</div>
                    <h3>No open matches</h3>
                    <p class="text-faint mt-1">Be the first to create a match request!</p>
                </div>`;
            }

            matches.forEach((match, i) => {
                const fillPercent = Math.round((match.playersJoined.length / match.maxPlayers) * 100);
                const spotsLeft = match.maxPlayers - match.playersJoined.length;
                const isMine = isLogged && match.playersJoined.some(p => p.userId === user.id);
                const skillClass = `skill-${match.skillLevel}`;
                const requests = match.requests || [];
                const myRequest = isLogged ? requests.find(r => r.userId === user.id) : null;
                const sportIcon = (match.sport || 'football') === 'basketball' ? '🏀' : (match.sport || 'football') === 'padel' ? '🎾' : '⚽';

                html += `
                <div class="match-card animate-in" style="animation-delay:${i * 0.06}s;">
                    <div class="match-card-header">
                        <div>
                            <div style="font-weight:700;color:var(--text-h);font-size:1rem;">${sportIcon} ${match.location}</div>
                            <div class="text-sm text-faint">${formatDate(match.date)} · ${match.timeSlot}</div>
                        </div>
                        <div style="display:flex;gap:var(--s-2);align-items:center;">
                            <span class="badge ${skillClass}">${match.skillLevel}</span>
                            <span class="badge badge-neutral">${match.pitchType}</span>
                        </div>
                    </div>

                    ${match.notes ? `<p class="text-sm" style="margin-bottom:var(--s-3);color:var(--text-p);">${match.notes}</p>` : ''}

                    <div class="players-bar">
                        ${match.playersJoined.map(p => `<div class="player-dot" title="${p.name}">${p.name.charAt(0)}</div>`).join('')}
                        ${Array(spotsLeft).fill(0).map(() => '<div class="player-dot empty">?</div>').join('')}
                    </div>

                    <div class="progress-bar-wrap">
                        <div class="progress-bar-fill" style="width:${fillPercent}%"></div>
                    </div>

                    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:var(--s-3);">
                        <div class="text-sm text-faint">
                            ${match.playersJoined.length}/${match.maxPlayers} players · Hosted by <strong style="color:var(--text-h);">${match.creatorName}</strong>
                        </div>
                        <div style="display:flex;gap:var(--s-2);">
                             ${isLogged && (match.hostId === user.id || match.creatorId === user.id)
                        ? `<button class="btn btn-danger btn-sm" onclick="cancelMatch('${match.id}')">Cancel Match</button>
                           ${match.status === 'full' && !match.result ? `<button class="btn btn-primary btn-sm" onclick="openResultModal('${match.id}')">Submit Result</button>` : ''}
                           <button class="btn btn-accent btn-sm chat-btn" data-match-id="${match.id}">Chat 💬</button>`
                        : isMine
                            ? `<button class="btn btn-accent btn-sm chat-btn" data-match-id="${match.id}">Chat 💬</button>
                               <button class="btn btn-secondary btn-sm" onclick="leaveMatch('${match.id}')">Leave</button>
                               ${match.resultStatus === 'pending' && !match.result.confirmations.includes(user.id) ? `<button class="btn btn-accent btn-sm" onclick="confirmResult('${match.id}')">Confirm Result ✓</button>` : ''}`
                            : myRequest
                                ? `<button class="btn btn-outline btn-sm" disabled>Request Pending...</button>`
                                : isLogged
                                    ? Auth.hasRole('player')
                                        ? `<button class="btn btn-accent btn-sm" onclick="joinMatch('${match.id}')">Request to Join ⚡</button>`
                                        : `<span class="text-xs text-faint">Players only</span>`
                                    : `<a href="login.html" class="btn btn-primary btn-sm">Log in to join</a>`
                    }
                        </div>
                    </div>
                    ${match.resultStatus === 'pending' ? `<div class="text-xs mt-2" style="color:var(--warning);">⏳ Result pending confirmation (${match.result.confirmations.length} confirm)</div>` : ''}
                    ${match.resultStatus === 'confirmed' ? `<div class="text-xs mt-2" style="color:var(--accent);">✅ Result confirmed! Stats updated. (${match.result.score1}-${match.result.score2})</div>` : ''}
                </div>`;
            });

            document.getElementById('matchList').innerHTML = html;
        }

        function renderSidebar() {
            const allMatches = MatchRequestsStore.getAll();
            const openCount = allMatches.filter(m => m.status === 'open').length;
            const fullCount = allMatches.filter(m => m.status === 'full').length;

            let createForm = '';
            if (isLogged) {
                createForm = `
                <div class="card create-match-card animate-in">
                    <h3 style="margin-bottom:var(--s-5);">⚡ Create Match</h3>
                    <div class="form-group">
                        <label class="form-label" for="mSport">Sport Type</label>
                        <select class="form-select" id="mSport">
                            <option value="football">Football</option>
                            <option value="padel">Padel</option>
                            <option value="basketball">Basketball</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="mLocation">Location *</label>
                        <input type="text" class="form-input" id="mLocation" placeholder="e.g., Nasr City, Cairo">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="mDate">Date *</label>
                            <input type="date" class="form-input" id="mDate">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="mTime">Time *</label>
                            <select class="form-select" id="mTime">
                                <option value="0:00-1:00">12:00 AM – 1:00 AM</option>
                                <option value="1:00-2:00">1:00 AM – 2:00 AM</option>
                                <option value="2:00-3:00">2:00 AM – 3:00 AM</option>
                                <option value="3:00-4:00">3:00 AM – 4:00 AM</option>
                                <option value="4:00-5:00">4:00 AM – 5:00 AM</option>
                                <option value="5:00-6:00">5:00 AM – 6:00 AM</option>
                                <option value="6:00-7:00">6:00 AM – 7:00 AM</option>
                                <option value="7:00-8:00">7:00 AM – 8:00 AM</option>
                                <option value="8:00-9:00">8:00 AM – 9:00 AM</option>
                                <option value="9:00-10:00">9:00 AM – 10:00 AM</option>
                                <option value="10:00-11:00">10:00 AM – 11:00 AM</option>
                                <option value="11:00-12:00">11:00 AM – 12:00 PM</option>
                                <option value="12:00-13:00">12:00 PM – 1:00 PM</option>
                                <option value="13:00-14:00">1:00 PM – 2:00 PM</option>
                                <option value="14:00-15:00">2:00 PM – 3:00 PM</option>
                                <option value="15:00-16:00">3:00 PM – 4:00 PM</option>
                                <option value="16:00-17:00">4:00 PM – 5:00 PM</option>
                                <option value="17:00-18:00">5:00 PM – 6:00 PM</option>
                                <option value="18:00-19:00" selected>6:00 PM – 7:00 PM</option>
                                <option value="19:00-20:00">7:00 PM – 8:00 PM</option>
                                <option value="20:00-21:00">8:00 PM – 9:00 PM</option>
                                <option value="21:00-22:00">9:00 PM – 10:00 PM</option>
                                <option value="22:00-23:00">10:00 PM – 11:00 PM</option>
                                <option value="23:00-0:00">11:00 PM – 12:00 AM</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="mSkill">Skill Level</label>
                            <select class="form-select" id="mSkill">
                                <option value="all levels">All Levels</option>
                                <option value="beginner">Beginner</option>
                                <option value="intermediate" selected>Intermediate</option>
                                <option value="advanced">Advanced</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="mPitchType">Pitch/Court Type</label>
                            <select class="form-select" id="mPitchType">
                                <option value="5-a-side">5-a-side (F)</option>
                                <option value="7-a-side">7-a-side (F)</option>
                                <option value="Outdoor">Outdoor Court</option>
                                <option value="Indoor">Indoor Court</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="mMaxPlayers">Max Players</label>
                        <input type="number" class="form-input" id="mMaxPlayers" value="10" min="2" max="22">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="mNotes">Notes</label>
                        <textarea class="form-textarea" id="mNotes" rows="2" placeholder="Any details..."></textarea>
                    </div>
                    <button class="btn btn-primary btn-block" onclick="createMatch()" ${!Auth.hasRole('player') ? 'disabled' : ''}>Create Match 🚀</button>
                    ${!Auth.hasRole('player') ? '<p class="text-xs text-center mt-2 text-warning">Only players can create matches</p>' : ''}
                </div>`;
            } else {
                createForm = `
                <div class="card text-center animate-in" style="padding:var(--s-8);">
                    <div style="font-size:2rem;margin-bottom:var(--s-3);">🤝</div>
                    <p class="text-sm text-faint" style="margin-bottom:var(--s-3);">Log in to create a match or join one</p>
                    <a href="login.html" class="btn btn-primary btn-sm btn-block">Log In</a>
                </div>`;
            }

            document.getElementById('matchSidebar').innerHTML = `
                <div class="card animate-in" style="margin-bottom:var(--s-4);">
                    <h4 style="margin-bottom:var(--s-4);">📊 Matchmaking</h4>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--s-3);">
                        <div class="stat-card" style="padding:var(--s-3);text-align:center;">
                            <div class="stat-value" style="font-size:1.3rem;color:var(--accent);">${openCount}</div>
                            <div class="stat-label">Open</div>
                        </div>
                        <div class="stat-card" style="padding:var(--s-3);text-align:center;">
                            <div class="stat-value" style="font-size:1.3rem;">${fullCount}</div>
                            <div class="stat-label">Full</div>
                        </div>
                    </div>
                </div>
                ${createForm}
            `;
        }

        function joinMatch(id) {
            const result = MatchmakingManager.joinMatch(id);
            if (result.success) {
                showToast(result.isFull ? 'Match is now full! ⚽' : 'You joined the match! 🤝', 'success');
                renderMatches();
                renderSidebar();
            } else {
                showToast(result.message, 'error');
            }
        }

        function leaveMatch(id) {
            const result = MatchmakingManager.leaveMatch(id);
            if (result.success) {
                showToast('You left the match', 'info');
                renderMatches();
            } else {
                showToast(result.message, 'error');
            }
        }

        function cancelMatch(id) {
            if (!confirm('Cancel this match? All players will be removed.')) return;
            const result = MatchmakingManager.cancelMatch(id);
            if (result.success) {
                showToast('Match cancelled', 'info');
                renderMatches();
                renderSidebar();
            } else {
                showToast(result.message, 'error');
            }
        }

        function createMatch() {
            const sport = document.getElementById('mSport').value;
            const location = document.getElementById('mLocation').value.trim();
            const date = document.getElementById('mDate').value;
            const timeSlot = document.getElementById('mTime').value;
            const skillLevel = document.getElementById('mSkill').value;
            const pitchType = document.getElementById('mPitchType').value;
            const maxPlayers = parseInt(document.getElementById('mMaxPlayers').value) || 10;
            const notes = document.getElementById('mNotes').value.trim();

            if (!location) { showToast('Please enter a location', 'error'); return; }
            if (!date) { showToast('Please select a date', 'error'); return; }

            const result = MatchmakingManager.createRequest({ sport, location, date, timeSlot, skillLevel, pitchType, maxPlayers, notes });
            if (result.success) {
                showToast('Match created! Waiting for players... 🤝', 'success');
                renderMatches();
                renderSidebar();
            } else {
                showToast(result.message || 'Failed to create match', 'error');
            }
        }

        function openResultModal(id) {
            document.getElementById('matchIdToSubmit').value = id;
            document.getElementById('resultModal').classList.add('active');
        }

        function closeResultModal() {
            document.getElementById('resultModal').classList.remove('active');
        }

        function submitResult() {
            const id = document.getElementById('matchIdToSubmit').value;
            const s1 = parseInt(document.getElementById('score1').value);
            const s2 = parseInt(document.getElementById('score2').value);

            const res = MatchmakingManager.submitResult(id, s1, s2);
            if (res.success) {
                showToast('Result submitted for confirmation!', 'success');
                closeResultModal();
                renderMatches();
            } else {
                showToast(res.message, 'error');
            }
        }

        function confirmResult(id) {
            const res = MatchmakingManager.confirmResult(id);
            if (res.success) {
                showToast(res.confirmed ? 'Result confirmed! Stats updated. ⚽' : 'Confirmation recorded!', 'success');
                renderMatches();
            } else {
                showToast(res.message, 'error');
            }
        }

        renderMatches();
        renderSidebar();

        // ---- DELEGATED CHAT LISTENER (Fix) ----
        document.addEventListener('click', e => {
            const btn = e.target.closest('.chat-btn');
            if (btn) {
                e.preventDefault();
                const mid = btn.getAttribute('data-match-id');
                if (mid) openMatchChat(mid);
            }
        });

        function handleRequest(matchId, playerId, status) {
            const res = MatchmakingManager.handleRequest(matchId, playerId, status);
            if (res.success) {
                showToast(status === 'approved' ? 'Player approved!' : 'Request rejected', 'info');
                renderMatches();
            } else {
                showToast(res.message, 'error');
            }
        }

        // ---- CHAT LOGIC ----
        let currentChatMatchId = null;

        function openMatchChat(matchId) {
            currentChatMatchId = matchId;
            const match = MatchmakingManager.getById(matchId);
            if (!match) return;
            document.getElementById('chatTitle').textContent = `Match: ${match.location}`;
            document.getElementById('matchChatPanel').classList.add('active');
            document.getElementById('chatToggle').classList.add('hidden');
            renderChatMessages();

            // Auto refresh
            if (window._chatInterval) clearInterval(window._chatInterval);
            window._chatInterval = setInterval(renderChatMessages, 3000);
        }

        function toggleChat() {
            const panel = document.getElementById('matchChatPanel');
            const toggle = document.getElementById('chatToggle');
            panel.classList.toggle('active');
            if (panel.classList.contains('active')) {
                toggle.classList.add('hidden');
                renderChatMessages();
            } else {
                if (currentChatMatchId) toggle.classList.remove('hidden');
            }
        }

        function renderChatMessages() {
            if (!currentChatMatchId) return;
            const messages = MatchChat.getMessages(currentChatMatchId);
            const container = document.getElementById('chatMessages');

            container.innerHTML = messages.map(m => {
                const isMe = m.senderId === user.id;
                return `
                    <div class="chat-msg ${isMe ? 'sent' : 'received'}">
                        <div class="chat-msg-info">${isMe ? 'You' : m.senderName}</div>
                        ${m.message}
                    </div>
                `;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        function sendChatMessage() {
            const input = document.getElementById('chatInputField');
            const text = input.value.trim();
            if (!text || !currentChatMatchId) return;

            MatchChat.sendMessage(currentChatMatchId, user.id, user.name, text);
            input.value = '';
            renderChatMessages();
        }

        // Close modal on click outside
        document.getElementById('resultModal').addEventListener('click', function (e) {
            if (e.target === this) closeResultModal();
        });

        // Enter key for chat
        document.getElementById('chatInputField').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendChatMessage();
        });
    </script>
</body>

</html>
