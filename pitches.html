<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Pitches — SPORTIFY</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .filter-bar {
            display: flex;
            gap: var(--s-3);
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar .form-input,
        .filter-bar .form-select {
            margin-bottom: 0;
        }

        .pitch-img {
            width: 100%;
            height: 170px;
            border-radius: var(--r-md);
            background: linear-gradient(145deg, var(--bg-elevated), var(--bg-surface));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-faint);
            font-size: 2.5rem;
            margin-bottom: var(--s-4);
            position: relative;
            overflow: hidden;
        }

        .pitch-img::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 50%, rgba(0, 0, 0, 0.3));
        }

        .pitch-amenities {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: var(--s-2);
        }

        .pitch-rating {
            color: var(--warning);
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div id="navbar"></div>
        <section class="main-content">
            <div class="container">
                <div class="section-header">
                    <h2>Browse Pitches</h2>
                    <p>Find and book the perfect pitch for your game</p>
                </div>

                <!-- Filters -->
                <div class="card mb-3" style="padding:var(--s-4) var(--s-5);">
                    <div class="filter-bar">
                        <input class="form-input" type="text" id="searchInput" placeholder="Search pitches..."
                            style="flex:1;min-width:180px;" oninput="filterPitches()">
                        <select class="form-select" id="typeFilter" onchange="filterPitches()">
                            <option value="">All Types</option>
                            <option value="5-a-side">5-a-side</option>
                            <option value="7-a-side">7-a-side</option>
                            <option value="11-a-side">11-a-side</option>
                        </select>
                        <select class="form-select" id="sortFilter" onchange="filterPitches()">
                            <option value="rating">Top Rated</option>
                            <option value="price_low">Price: Low → High</option>
                            <option value="price_high">Price: High → Low</option>
                        </select>
                    </div>
                </div>

                <div id="pitchCount" class="text-sm text-faint mb-2"></div>
                <div class="grid grid-3" id="pitchGrid"></div>
            </div>
        </section>
        <div id="footer"></div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/roles.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        initPage('pitches');

        function filterPitches() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const type = document.getElementById('typeFilter').value;
            const sort = document.getElementById('sortFilter').value;

            let pitches = PitchesStore.getAll();
            if (search) pitches = pitches.filter(p => p.name.toLowerCase().includes(search) || p.location.toLowerCase().includes(search));
            if (type) pitches = pitches.filter(p => p.type === type);

            if (sort === 'rating') pitches.sort((a, b) => b.rating - a.rating);
            else if (sort === 'price_low') pitches.sort((a, b) => a.pricePerHour - b.pricePerHour);
            else pitches.sort((a, b) => b.pricePerHour - a.pricePerHour);

            document.getElementById('pitchCount').textContent = `${pitches.length} pitch${pitches.length !== 1 ? 'es' : ''}`;
            document.getElementById('pitchGrid').innerHTML = pitches.length === 0
                ? '<div class="card text-center" style="grid-column:1/-1;padding:var(--s-16);"><p class="text-faint">No pitches match your criteria</p></div>'
                : pitches.map(p => {
                    const owner = getUserById(p.ownerId);
                    return `
          <div class="card animate-in">
            <div class="pitch-img">⚽</div>
            <div class="card-header">
              <div>
                <div class="card-title">${p.name}</div>
                <div class="card-subtitle">${p.location}</div>
              </div>
              <span class="badge badge-primary">${p.type}</span>
            </div>
            <div class="card-body">
              <div class="flex" style="gap:var(--s-2);"><span class="pitch-rating">${getStarRating(p.rating)}</span><span class="text-sm text-faint">${p.rating}</span></div>
              <div class="pitch-amenities">${p.amenities.map(a => `<span class="badge badge-neutral">${a}</span>`).join('')}</div>
              <div class="text-xs text-faint mt-1">Capacity: ${p.capacity}${owner ? ' · ' + owner.name : ''}</div>
            </div>
            <div class="card-footer">
              <span class="price">${p.pricePerHour} EGP <span class="text-xs text-faint" style="font-weight:400;">/hr</span></span>
              <a href="booking.html?pitch=${p.id}" class="btn btn-primary btn-sm">Book</a>
            </div>
          </div>`;
                }).join('');
        }
        filterPitches();
    </script>
</body>

</html>
