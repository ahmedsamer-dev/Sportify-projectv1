<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="SPORTIFY Subscription — Manage your platform subscription. Pitch Owners and Coaches only.">
    <title>Subscription — SPORTIFY</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .plans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--s-6);
            margin-bottom: var(--s-8);
        }

        .plan-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-xl);
            padding: var(--s-8);
            text-align: center;
            position: relative;
            transition: all var(--t-base);
        }

        .plan-card:hover {
            border-color: var(--primary-border);
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.15);
        }

        .plan-card.recommended {
            border-color: var(--primary);
            box-shadow: 0 0 0 1px var(--primary), 0 8px 32px rgba(99, 102, 241, 0.15);
        }

        .plan-card.recommended::before {
            content: '⭐ Recommended';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            padding: 3px 16px;
            border-radius: var(--r-full);
            font-size: 0.72rem;
            font-weight: 700;
        }

        .plan-price {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-h);
            margin: var(--s-4) 0;
        }

        .plan-price span {
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text-faint);
        }

        .plan-features {
            text-align: left;
            margin: var(--s-5) 0;
        }

        .plan-features li {
            padding: var(--s-2) 0;
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .plan-features li::before {
            content: '✓';
            color: var(--accent);
            font-weight: 700;
        }

        .current-plan {
            margin-bottom: var(--s-8);
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div id="navbar"></div>
        <section class="main-content">
            <div class="container" id="subContent"></div>
        </section>
        <div id="footer"></div>
    </div>

    <script src="js/sports-config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/roles.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/subscription.js"></script>
    <script src="js/race-guard.js"></script>
    <script src="js/app.js"></script>
    <script>
        initPage('subscription');

        if (!Auth.isLoggedIn()) {
            window.location.href = 'login.html';
        } else {
            renderSubscription();
        }

        function renderSubscription() {
            const user = Auth.getCurrentUser();
            const roles = RolesManager.getUserRoles(user);
            const isOwner = roles.includes('pitch_owner');
            const isCoach = roles.includes('coach');
            const isAdmin = roles.includes('admin');

            // Player view — subscription not needed
            if (!isOwner && !isCoach && !isAdmin) {
                document.getElementById('subContent').innerHTML = `
                <div class="section-header animate-in">
                    <h1>💳 Subscription</h1>
                </div>
                <div class="card text-center" style="padding:var(--s-16);">
                    <div style="font-size:3rem;margin-bottom:var(--s-4);">🎉</div>
                    <h2>Players Are Free!</h2>
                    <p class="text-faint mt-2">SPORTIFY is completely free for players. No subscriptions needed.</p>
                    <p class="text-faint">Just browse, book, play, and enjoy! ⚽</p>
                    <a href="index.html" class="btn btn-primary mt-3">Back to Home</a>
                </div>`;
                return;
            }

            const sub = SubscriptionManager.getUserSubscription(user.id);
            const plan = sub ? SubscriptionManager.getPlan(sub.planId) : null;

            // Determine relevant plans
            const relevantPlans = Object.values(SUBSCRIPTION_PLANS).filter(p => {
                if (isOwner && p.role === 'pitch_owner') return true;
                if (isCoach && p.role === 'coach') return true;
                return false;
            });

            document.getElementById('subContent').innerHTML = `
                <div class="section-header animate-in">
                    <h1>💳 Subscription Management</h1>
                    <p>Manage your SPORTIFY platform subscription</p>
                </div>

                <!-- Current Plan Status -->
                <div class="current-plan animate-in">
                    ${SubscriptionManager.getInfoCardHTML(user.id)}
                </div>

                <!-- Business Model Info -->
                <div class="card animate-in" style="margin-bottom:var(--s-6);border-left:3px solid var(--accent);">
                    <div style="padding:var(--s-2) var(--s-3);">
                        <h4 style="margin-bottom:var(--s-2);">💡 SPORTIFY Business Model</h4>
                        <p class="text-sm text-faint">SPORTIFY acts as a <strong style="color:var(--text-h);">connector platform</strong>. Players use the platform for <strong style="color:var(--accent);">FREE</strong>.</p>
                        <p class="text-sm text-faint mt-1">Revenue comes from Pitch Owner and Coach subscriptions only.</p>
                    </div>
                </div>

                <!-- Available Plans -->
                <h2 style="margin-bottom:var(--s-5);" class="animate-in">Available Plans</h2>
                <div class="plans-grid">
                    ${relevantPlans.map((p, i) => {
                const isCurrent = sub && sub.planId === p.id;
                const isRecommended = !isCurrent && (p.id === 'coach_premium' || p.id === 'pitch_owner_basic');
                return `
                        <div class="plan-card ${isRecommended ? 'recommended' : ''} ${isCurrent ? '' : ''} animate-in" style="animation-delay:${i * 0.1}s;">
                            ${isCurrent ? '<span class="badge badge-accent" style="position:absolute;top:12px;right:12px;">Current</span>' : ''}
                            <div style="font-size:2rem;margin-bottom:var(--s-2);">${p.role === 'pitch_owner' ? '🏟️' : '🧑‍🏫'}</div>
                            <h3>${p.name}</h3>
                            <div class="plan-price">${p.price} <span>${p.currency}/${p.period}</span></div>
                            <ul class="plan-features">
                                ${p.features.map(f => `<li>${f.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}</li>`).join('')}
                                ${p.limits.maxAcademies ? `<li>Up to ${p.limits.maxAcademies} Academies</li>` : ''}
                                ${p.limits.maxPitches ? `<li>Up to ${p.limits.maxPitches} Pitches</li>` : ''}
                            </ul>
                            ${isCurrent
                        ? '<button class="btn btn-secondary btn-block" disabled>Current Plan</button>'
                        : `<button class="btn btn-primary btn-block" onclick="activatePlan('${p.id}')">Activate Plan</button>`
                    }
                        </div>`;
            }).join('')}
                </div>

                <!-- Subscription History -->
                ${sub ? `
                <h2 style="margin-bottom:var(--s-5);" class="animate-in">Subscription Details</h2>
                <div class="card animate-in">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr><th>Plan</th><th>Status</th><th>Start Date</th><th>End Date</th><th>Auto Renew</th></tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><strong style="color:var(--text-h);">${plan ? plan.name : sub.planId}</strong></td>
                                    <td><span class="badge ${sub.status === 'active' ? 'badge-accent' : 'badge-warning'}">${sub.status}</span></td>
                                    <td>${formatDate(sub.startDate)}</td>
                                    <td>${formatDate(sub.endDate)}</td>
                                    <td>${sub.autoRenew ? '✅ Yes' : '❌ No'}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>` : ''}
            `;
        }

        function activatePlan(planId) {
            if (!Auth.isLoggedIn()) return;
            const user = Auth.getCurrentUser();

            // MVP: Instantly activate (in production, this would go through payment)
            const existing = SubscriptionManager.getUserSubscription(user.id);
            if (existing) {
                SubscriptionsStore.update(existing.id, { status: 'cancelled' });
            }

            const startDate = new Date().toISOString().split('T')[0];
            const endDate = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];

            SubscriptionsStore.add({
                userId: user.id,
                planId: planId,
                status: 'active',
                startDate,
                endDate,
                autoRenew: true,
                sportModule: 'football'
            });

            showToast('Plan activated successfully! 🎉', 'success');
            renderSubscription();
        }
    </script>
</body>

</html>
