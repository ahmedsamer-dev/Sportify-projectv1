<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in — SPORTIFY</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-card animate-in">
            <a href="index.html" class="nav-logo" style="display:block;margin-bottom:var(--s-8);">⚽ SPORTIFY</a>
            <h2>Welcome back</h2>
            <p class="subtitle">Sign in to continue to your account</p>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input class="form-input" type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" type="password" id="password" placeholder="Enter your password" required>
                </div>
                <div id="errorMsg" class="form-error mb-2" style="display:none;"></div>
                <button type="submit" class="btn btn-primary btn-block btn-lg">Sign In</button>
            </form>

            <p class="text-center mt-3" style="color:var(--text-faint);font-size:0.875rem;">
                Don't have an account? <a href="register.html">Create one</a>
            </p>

            <div class="mt-3"
                style="padding:var(--s-4);border-radius:var(--r-md);background:var(--bg-surface);border:1px solid var(--border);font-size:0.78rem;color:var(--text-faint);">
                <strong style="color:var(--text-p);">Demo Accounts</strong><br>
                Admin: admin@admin.com / admin123<br>
                Player: ahmed@mail.com / pass123<br>
                Owner: moh@pitch.com / pass123<br>
                Coach: karim@coach.com / pass123
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/roles.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        if (Auth.isLoggedIn()) window.location.href = 'profile.html';

        function handleLogin(e) {
            e.preventDefault();
            const result = Auth.login(document.getElementById('email').value, document.getElementById('password').value);
            if (result.success) {
                window.location.href = result.user.role === 'admin' ? 'admin.html' : 'profile.html';
            } else {
                const err = document.getElementById('errorMsg');
                err.textContent = result.message;
                err.style.display = 'block';
            }
        }
    </script>
</body>

</html>
