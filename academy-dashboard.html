<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy Dashboard — SPORTIFY</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="page-wrapper">
        <div id="navbar"></div>
        <section class="main-content">
            <div class="container">
                <div class="section-header-premium animate-in">
                    <div class="header-badge-premium">🎓 STUDENT PORTAL</div>
                    <h1 class="header-title-premium" id="academyTitle">Academy Dashboard</h1>
                    <p id="academyDesc">Loading academy details...</p>
                    <div class="header-divider-premium"></div>
                </div>

                <div class="grid grid-3 gap-6">
                    <!-- Membership Status -->
                    <div class="card flex-col animate-in animate-delay-1" style="grid-column: span 2;">
                        <div class="membership-card">
                            <h3 style="color:var(--primary);">Active Membership</h3>
                            <div class="flex-between mt-4">
                                <span class="text-faint">Subscription End</span>
                                <span class="text-strong" id="subEnd">--</span>
                            </div>
                            <div class="flex-between mt-1">
                                <span class="text-faint">Remaining Time</span>
                                <span class="text-accent" id="daysLeft">-- days</span>
                            </div>
                            <div class="progress-bar-premium">
                                <div class="progress-fill-premium" id="subProgress" style="width: 0%;"></div>
                            </div>
                        </div>

                        <div class="grid grid-2 gap-4 mt-6">
                            <div class="card bg-elevated border-soft">
                                <div class="text-xs text-faint uppercase font-bold">Start Date</div>
                                <div class="text-lg mt-1" id="startDate">--</div>
                            </div>
                            <div class="card bg-elevated border-soft">
                                <div class="text-xs text-faint uppercase font-bold">Category</div>
                                <div class="text-lg mt-1" id="academyCategory">--</div>
                            </div>
                        </div>

                        <div class="card mt-6 bg-elevated border-soft">
                            <h4 class="mb-3">Training Schedule</h4>
                            <div id="academySchedule" class="text-sm">--</div>
                        </div>
                    </div>

                    <!-- Sidebar Actions -->
                    <div class="flex-col gap-4 animate-in animate-delay-2">
                        <div class="card text-center">
                            <div class="coach-card-avatar mx-auto mb-3" id="coachAvatar"
                                style="width: 60px; height: 60px;">C</div>
                            <h4 id="coachName">Head Coach</h4>
                            <p class="text-xs text-faint mb-4">Certified Instructor</p>
                            <button class="btn btn-primary btn-block" onclick="toggleChat()">Message Coach</button>
                        </div>

                        <div class="card">
                            <h4 class="mb-3">Quick Actions</h4>
                            <div class="flex-col gap-2">
                                <button class="btn btn-outline btn-sm btn-block">Download Syllabus</button>
                                <button class="btn btn-outline btn-sm btn-block">Request Attendance Fix</button>
                                <button class="btn btn-error btn-sm btn-block">Unenroll</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Messenger Widget -->
        <div class="msg-chat-widget">
            <div id="chatPanel" class="msg-panel">
                <div class="msg-header">
                    <div class="coach-card-avatar" style="width: 32px; height: 32px; font-size: 0.8rem;"
                        id="chatAvatar">C</div>
                    <div>
                        <div class="text-sm font-bold" id="chatName">Coach Name</div>
                        <div class="text-xs text-primary">online</div>
                    </div>
                    <button class="btn btn-icon ml-auto" onclick="toggleChat()"
                        style="background:transparent; border:none; color:inherit;">✕</button>
                </div>
                <div class="msg-history" id="chatHistory">
                    <div class="chat-bubble bubble-received">Hello! Ready for today's session?</div>
                </div>
                <form class="msg-input-area" onsubmit="sendMessage(event)">
                    <input type="text" class="form-input text-sm" id="msgInput" placeholder="Write a message..."
                        style="flex:1;">
                    <button type="submit" class="btn btn-primary" style="padding: 0 16px;">➤</button>
                </form>
            </div>
            <button class="btn btn-primary" id="chatFab" onclick="toggleChat()"
                style="width: 56px; height: 56px; border-radius: 50%; box-shadow: var(--shadow-xl);">💬</button>
        </div>

        <div id="footer"></div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/roles.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        initPage('academy-dashboard');

        const params = new URLSearchParams(window.location.search);
        const academyId = params.get('academy');
        const user = Auth.getCurrentUser();

        if (!user) {
            window.location.href = 'index.html';
        }

        const isPlayer = Auth.hasRole('player');
        const isCoach = Auth.hasRole('coach');
        const isOwner = Auth.hasRole('pitch_owner');

        if (!isPlayer && !isCoach && !isOwner) {
            window.location.href = 'index.html';
        }

        // Security Check: Is enrolled? (Players only)
        if (isPlayer && !isCoach && !isOwner) {
            const state = getEnrollmentState(academyId, user.id);
            if (state !== EnrollmentStates.ACTIVE && state !== EnrollmentStates.EXPIRED) {
                alert('Access Denied: You must be enrolled to view this dashboard.');
                window.location.href = 'academies.html';
            }
        }

        function loadDashboard() {
            const academy = AcademiesStore.getById(academyId);
            const enrollment = AcademyEnrollmentsStore.filter(en => en.academyId === academyId && en.playerId === user.id)[0];
            const coachUser = academy ? getUserById(academy.coachUserId) : null;

            if (!academy) return;
            // Enrollment is optional for coach/owner view

            document.getElementById('academyTitle').innerText = academy.name;
            document.getElementById('academyDesc').innerText = academy.description;
            document.getElementById('academyCategory').innerText = academy.category;
            document.getElementById('academySchedule').innerText = academy.schedule;
            document.getElementById('coachName').innerText = coachUser ? coachUser.name : 'Unknown Coach';
            document.getElementById('chatName').innerText = coachUser ? coachUser.name : 'Unknown Coach';
            document.getElementById('coachAvatar').innerText = (coachUser ? coachUser.name : 'C').charAt(0);
            document.getElementById('chatAvatar').innerText = (coachUser ? coachUser.name : 'C').charAt(0);

            document.getElementById('startDate').innerText = enrollment ? enrollment.enrolledAt : 'N/A';
            document.getElementById('subEnd').innerText = enrollment ? enrollment.subscriptionEnd : 'N/A';

            // Progress Logic
            if (enrollment) {
                const start = new Date(enrollment.enrolledAt).getTime();
                const end = new Date(enrollment.subscriptionEnd).getTime();
                const now = Date.now();
                const total = end - start;
                const elapsed = now - start;
                const percent = Math.max(0, Math.min(100, (elapsed / total) * 100));
                const daysLeft = Math.max(0, Math.ceil((end - now) / (1000 * 60 * 60 * 24)));

                document.getElementById('subProgress').style.width = percent + '%';
                document.getElementById('daysLeft').innerText = daysLeft + ' days';

                if (daysLeft < 5) {
                    document.getElementById('daysLeft').style.color = 'var(--error)';
                }
            } else {
                document.getElementById('subProgress').style.width = '0%';
                document.getElementById('daysLeft').innerText = 'Admin View';
            }

            // Load Messages
            loadMessages();
        }

        function toggleChat() {
            const panel = document.getElementById('chatPanel');
            panel.classList.toggle('active');
            if (panel.classList.contains('active')) {
                const history = document.getElementById('chatHistory');
                history.scrollTop = history.scrollHeight;
            }
        }

        function loadMessages() {
            if (!user || !academyId) return;
            const msgs = AcademyMessagesStore.filter(m =>
                (m.fromId === user.id && m.toId === academyId) ||
                (m.fromId === academyId && m.toId === user.id)
            );
            const history = document.getElementById('chatHistory');
            history.innerHTML = msgs.length > 0
                ? msgs.map(m => `
                    <div class="chat-bubble ${m.fromId === user.id ? 'bubble-sent' : 'bubble-received'}">${m.text}</div>
                `).join('')
                : '<div class="chat-bubble bubble-received">Hello! Ready for today\'s session?</div>';
            history.scrollTop = history.scrollHeight;
        }

        function sendMessage(e) {
            if (e) e.preventDefault();
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !user || !academyId) return;

            AcademyMessagesStore.add({
                fromId: user.id,
                toId: academyId,
                text: text,
                timestamp: new Date().toISOString()
            });

            input.value = '';
            loadMessages();
        }

        // Staggered refresh
        setInterval(loadMessages, 5000);

        loadDashboard();
    </script>
</body>

</html>
